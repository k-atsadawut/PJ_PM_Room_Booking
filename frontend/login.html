<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ — ระบบจองห้องผลิตสื่อดิจิทัล</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/theme.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
    .dark .glass-card {
      background: rgba(30, 41, 59, 0.95) !important;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input-focus:focus {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function LoginPage() {
      const [email, setEmail]       = useState('');
      const [password, setPassword] = useState('');
      const [error, setError]       = useState('');
      const [loading, setLoading]   = useState(false);
      const [showPassword, setShowPassword] = useState(false);
      const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));

      useEffect(() => {
        // Check if today is a holiday
        apiFetch('/api/holidays/today')
          .then(holidayData => {
            if (holidayData) {
              setHoliday(holidayData);
            }
          })
          .catch(() => {});

        apiFetch('/api/auth/me')
          .then(({ user }) => {
            sessionStorage.setItem('showHolidayPopup', 'true');
            location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/dashboard.html';
          })
          .catch(() => {});

        const handleThemeChange = (e) => {
          setIsDark(document.documentElement.classList.contains('dark'));
        };
        window.addEventListener('themeChanged', handleThemeChange);

        return () => {
          window.removeEventListener('themeChanged', handleThemeChange);
        };
      }, []);

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const response = await apiFetch('/api/auth/login', {
            method: 'POST',
            body: { email, password },
          });
          if (response.user.forceChangePassword) {
            location.href = '/change-password.html';
          } else {
            sessionStorage.setItem('showHolidayPopup', 'true');
            location.href = response.user.role === 'admin' ? '/admin/dashboard.html' : '/dashboard.html';
          }
        } catch (err) {
          if (err.isHoliday) {
            setError(err.error);
          } else {
            // Show detailed error with attempt count if available
            if (err.message && err.message.includes('/')) {
              setError(err.message);
            } else if (err.isLocked) {
              setError(err.message);
            } else {
              setError(err.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
            }
          }
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen flex relative">
          {/* Theme Toggle Button */}
          <div className="absolute top-4 right-4 z-50">
            <button 
              onClick={() => window.toggleTheme()} 
              className="text-gray-500 hover:text-blue-600 transition p-2.5 bg-white shadow-md border rounded-xl hover:shadow-lg"
              aria-label="เปลี่ยนธีม"
            >
              {isDark ? (
                <svg className="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
              ) : (
                <svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
              )}
            </button>
          </div>
          {/* Left Panel - Branding */}
          <div className="hidden">
            <div className="max-w-lg text-white">
              <div className="flex items-center gap-4 mb-8">
                <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-sm">
                  <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-3xl font-bold">ระบบจองห้องผลิตสื่อดิจิทัล</h1>
                  <p className="text-blue-100 mt-1">มหาวิทยาลัยนอร์ทกรุงเทพ</p>
                </div>
              </div>
              
              <div className="space-y-6">
                <div className="flex items-start gap-4">
                  <div className="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                  </div>
                  <div>
                    <h3 className="font-semibold text-lg">จองห้องง่ายและรวดเร็ว</h3>
                    <p className="text-blue-100 text-sm mt-1">ระบบจองห้องสตูดิโอและห้องประชุมออนไลน์ที่ใช้งานง่าย</p>
                  </div>
                </div>
                
                <div className="flex items-start gap-4">
                  <div className="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                  </div>
                  <div>
                    <h3 className="font-semibold text-lg">ติดตามสถานะแบบเรียลไทม์</h3>
                    <p className="text-blue-100 text-sm mt-1">เช็คความว่างของห้องและสถานะการจองได้ทันที</p>
                  </div>
                </div>
                
                <div className="flex items-start gap-4">
                  <div className="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                  </div>
                  <div>
                    <h3 className="font-semibold text-lg">ปลอดภัยและเชื่อถือได้</h3>
                    <p className="text-blue-100 text-sm mt-1">ระบบความปลอดภัยระดับมหาวิทยาลัย</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Right Panel - Login Form */}
          <div className="w-full flex items-center justify-center p-8 bg-gray-50">
            <div className="w-full max-w-md">
              <div className="lg:hidden text-center mb-8">
                <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                  <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </div>
                <h1 className="text-2xl font-bold text-gray-800">ระบบจองห้องผลิตสื่อดิจิทัล</h1>
                <p className="text-gray-500 mt-1">มหาวิทยาลัยนอร์ทกรุงเทพ</p>
              </div>

              <div className="glass-card rounded-2xl shadow-xl p-8">
                <div className="mb-8">
                  <h2 className="text-2xl font-bold text-gray-800">เข้าสู่ระบบ</h2>
                  <p className="text-gray-500 mt-2">ใช้บัญชี e-Learning เดียวกันเพื่อจองห้องเรียนและห้องประชุม</p>
                </div>

                {error && (
                  <div className="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm mb-6 flex items-center gap-2">
                    <svg className="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {error}
                  </div>
                )}

                <form onSubmit={handleSubmit} className="space-y-5">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">รหัสประจำตัว / อีเมลมหาวิทยาลัย</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                      </div>
                      <input
                        type="email"
                        value={email}
                        onChange={e => setEmail(e.target.value)}
                        required
                        className="w-full border border-gray-300 rounded-xl pl-10 pr-4 py-3 text-sm input-focus focus:outline-none focus:border-blue-500 transition"
                        placeholder="เช่น 6512345 หรือ name@northbkk.ac.th"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">รหัสผ่าน</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                      </div>
                      <input
                        type={showPassword ? 'text' : 'password'}
                        value={password}
                        onChange={e => setPassword(e.target.value)}
                        required
                        className="w-full border border-gray-300 rounded-xl pl-10 pr-12 py-3 text-sm input-focus focus:outline-none focus:border-blue-500 transition"
                        placeholder="กรอกรหัสผ่านของคุณ"
                      />
                      <button
                        type="button"
                        onClick={() => setShowPassword(!showPassword)}
                        className="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition"
                      >
                        {showPassword ? (
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                          </svg>
                        ) : (
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                          </svg>
                        )}
                      </button>
                    </div>
                  </div>

                  <div className="flex items-center justify-between">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" className="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
                      <span className="text-sm text-gray-600">จดจำฉันไว้ในระบบ</span>
                    </label>
                    <a href="/forgot-password.html" className="text-sm text-blue-600 hover:text-blue-700 transition">ลืมรหัสผ่าน?</a>
                  </div>

                  <button
                    type="submit"
                    disabled={loading}
                    className="w-full btn-primary text-white font-semibold py-3 rounded-xl disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    {loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบจองห้อง'}
                  </button>
                </form>

              

                <p className="text-center text-xs text-gray-400 mt-6">
                  ต้องการความช่วยเหลือเรื่องการจอง? ติดต่อฝ่ายอาคารสถานที่
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LoginPage />);
  </script>
</body>
</html>
