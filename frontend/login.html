<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ — ระบบจองห้องผลิตสื่อดิจิทัล</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/theme.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-slate-900 transition-colors">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Inline SVG icon helpers (same stroke style across the app)
    const Icon = {
      Mail:   (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
      Lock:   (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>,
      Eye:    (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      EyeOff: (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>,
      Sun:    (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" /></svg>,
      Moon:   (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
      Alert:  (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Camera: (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
      CalendarOff: (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
    };

    function formatThaiDate(dateStr) {
      const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
      const [y, m, d] = dateStr.split("-").map(Number);
      return `${d} ${months[m - 1]} ${y + 543}`;
    }

    function HolidayModal({ holiday, onClose }) {
      if (!holiday) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose} />
          <div className="relative bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl w-full max-w-md p-6 app-animate-in">
            <div className="flex flex-col items-center text-center mb-6">
              <div className="w-16 h-16 rounded-2xl bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center mb-4">
                <Icon.CalendarOff className="w-8 h-8 text-blue-600 dark:text-blue-400" />
              </div>
              <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">ประกาศวันหยุดทำการ</h2>
              <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">โปรดวางแผนการใช้งานหรือจองห้องล่วงหน้า</p>
            </div>
            <div className="space-y-3 mb-6">
              <div className="flex items-start gap-3 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl px-4 py-3">
                <Icon.CalendarOff className="w-4 h-4 text-blue-600 dark:text-blue-400 mt-0.5 flex-shrink-0" />
                <div>
                  <div className="text-sm font-semibold text-gray-800 dark:text-gray-100">{formatThaiDate(holiday.HolidayDate || holiday.date)}</div>
                  {holiday.Description && <div className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">{holiday.Description}</div>}
                </div>
              </div>
            </div>
            <button onClick={onClose} className="app-btn-primary w-full py-3 rounded-xl font-semibold text-sm">
              รับทราบ
            </button>
          </div>
        </div>
      );
    }

    function LoginPage() {
      const [email, setEmail]       = useState('');
      const [password, setPassword] = useState('');
      const [error, setError]       = useState('');
      const [loading, setLoading]   = useState(false);
      const [showPassword, setShowPassword] = useState(false);
      const [isDark, setIsDark]     = useState(document.documentElement.classList.contains('dark'));
      const [holiday, setHoliday]   = useState(null);

      useEffect(() => {
        // Already-logged-in? Redirect to the right dashboard.
        apiFetch('/api/auth/me')
          .then(({ user }) => {
            if (user.forceChangePassword) {
              location.href = '/change-password.html';
            } else {
              sessionStorage.setItem('showHolidayPopup', 'true');
              location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/dashboard.html';
            }
          })
          .catch(() => {});

        // Show holiday popup on login screen (public endpoint).
        apiFetch('/api/holidays/today')
          .then(holidayData => { if (holidayData) setHoliday(holidayData); })
          .catch(() => {});

        const handleThemeChange = () => setIsDark(document.documentElement.classList.contains('dark'));
        window.addEventListener('themeChanged', handleThemeChange);
        return () => window.removeEventListener('themeChanged', handleThemeChange);
      }, []);

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const response = await apiFetch('/api/auth/login', {
            method: 'POST',
            body: { email, password },
          });
          if (response.user.forceChangePassword) {
            location.href = '/change-password.html';
          } else {
            sessionStorage.setItem('showHolidayPopup', 'true');
            location.href = response.user.role === 'admin' ? '/admin/dashboard.html' : '/dashboard.html';
          }
        } catch (err) {
          setError(err.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen bg-gray-50 dark:bg-slate-900 flex flex-col items-center justify-center p-6 relative">
          {/* dot-grid background */}
          <div className="app-bg absolute inset-0 pointer-events-none opacity-60" />

          {/* Theme toggle — top right */}
          <div className="absolute top-4 right-4 z-10">
            <button
              onClick={() => window.toggleTheme()}
              className="w-9 h-9 rounded-full flex items-center justify-center bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition"
              aria-label="เปลี่ยนธีม"
            >
              {isDark
                ? <Icon.Sun className="w-4 h-4 text-yellow-400" />
                : <Icon.Moon className="w-4 h-4 text-slate-600" />}
            </button>
          </div>

          {/* Logo lockup */}
          <div className="relative z-10 flex flex-col items-center mb-8">
            <div className="app-logo-gradient w-16 h-16 rounded-2xl flex items-center justify-center mb-4 shadow-lg">
              <Icon.Camera className="w-8 h-8 text-white" style={{ filter: "drop-shadow(0 0 8px rgba(255,255,255,0.6))" }} />
            </div>
            <h1 className="text-xl font-bold text-gray-800 dark:text-gray-100 text-center leading-snug">
              ระบบจองห้องผลิตสื่อดิจิทัล
            </h1>
            <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">มหาวิทยาลัยนอร์ทกรุงเทพ</p>
          </div>

          {/* Card */}
          <div className="relative z-10 w-full max-w-sm">
            <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-8 shadow-xl">
              <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-1">เข้าสู่ระบบ</h2>
              <p className="text-sm text-gray-500 dark:text-gray-400 mb-6">ใช้อีเมลมหาวิทยาลัยของคุณเพื่อเข้าสู่ระบบ</p>

              {error && (
                <div className="flex items-start gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl px-4 py-3 mb-5">
                  <Icon.Alert className="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" />
                  <p className="text-sm text-red-700 dark:text-red-400">{error}</p>
                </div>
              )}

              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">อีเมลมหาวิทยาลัย</label>
                  <div className="relative">
                    <Icon.Mail className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                    <input
                      type="email"
                      value={email}
                      onChange={e => setEmail(e.target.value)}
                      required
                      className="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-sm text-gray-800 dark:text-gray-100 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition"
                      placeholder="example@northbkk.ac.th"
                    />
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">รหัสผ่าน</label>
                  <div className="relative">
                    <Icon.Lock className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                    <input
                      type={showPassword ? 'text' : 'password'}
                      value={password}
                      onChange={e => setPassword(e.target.value)}
                      required
                      className="w-full pl-10 pr-10 py-2.5 bg-gray-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-sm text-gray-800 dark:text-gray-100 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition"
                      placeholder="••••••••"
                    />
                    <button
                      type="button"
                      onClick={() => setShowPassword(p => !p)}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition"
                      aria-label={showPassword ? "ซ่อนรหัสผ่าน" : "แสดงรหัสผ่าน"}
                    >
                      {showPassword ? <Icon.EyeOff className="w-4 h-4" /> : <Icon.Eye className="w-4 h-4" />}
                    </button>
                  </div>
                </div>

                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 dark:text-gray-500"></span>
                  <a href="/forgot-password.html" className="text-xs text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition">
                    ลืมรหัสผ่าน?
                  </a>
                </div>

                <button
                  type="submit"
                  disabled={loading}
                  className="app-btn-primary w-full py-3 rounded-xl font-semibold text-sm"
                >
                  {loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ'}
                </button>
              </form>
            </div>
          </div>

          <HolidayModal holiday={holiday} onClose={() => setHoliday(null)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LoginPage />);
  </script>
</body>
</html>
