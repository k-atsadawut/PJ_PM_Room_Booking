<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เปลี่ยนรหัสผ่าน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ChangePasswordPage() {
      const [user, setUser]             = useState(null);
      const [newPass, setNewPass]       = useState('');
      const [confirm, setConfirm]       = useState('');
      const [current, setCurrent]       = useState('');
      const [otp, setOtp]               = useState('');
      const [error, setError]           = useState('');
      const [success, setSuccess]       = useState('');
      const [loading, setLoading]       = useState(false);
      const [otpSent, setOtpSent]       = useState(false);
      const [otpVerified, setOtpVerified] = useState(false);
      const [otpToken, setOtpToken]     = useState('');
      const [sendingOtp, setSendingOtp] = useState(false);
      const [verifyingOtp, setVerifyingOtp] = useState(false);

      useEffect(() => {
        apiFetch('/api/auth/me')
          .then(({ user }) => setUser(user))
          .catch(() => { location.href = '/login.html'; });
      }, []);

      async function handleSendOTP(e) {
        e.preventDefault();
        setError(''); setSuccess('');
        setSendingOtp(true);
        try {
          const result = await apiFetch('/api/otp/send', { method: 'POST' });
          console.log('OTP sent:', result);
          setSuccess('ส่ง OTP ไปยังอีเมลของคุณแล้ว');
          setOtpSent(true);
          setTimeout(() => setSuccess(''), 5000);
        } catch (err) {
          console.error('OTP send error:', err);
          setError(err.message || 'ไม่สามารถส่ง OTP ได้');
        } finally {
          setSendingOtp(false);
        }
      }

      async function handleVerifyOTP(e) {
        e.preventDefault();
        setError(''); setSuccess('');
        if (!otp || otp.length !== 6) return setError('กรุณาระบุ OTP 6 หลัก');
        setVerifyingOtp(true);
        try {
          const result = await apiFetch('/api/otp/verify', {
            method: 'POST',
            body: { code: otp }
          });
          console.log('OTP verified:', result);
          setOtpToken(result.otpToken || '');
          setSuccess('OTP ถูกต้อง');
          setOtpVerified(true);
          setTimeout(() => setSuccess(''), 3000);
        } catch (err) {
          console.error('OTP verify error:', err);
          setError(err.message || 'OTP ไม่ถูกต้อง');
        } finally {
          setVerifyingOtp(false);
        }
      }

      async function handleResendOTP(e) {
        e.preventDefault();
        setError(''); setSuccess('');
        setSendingOtp(true);
        try {
          const result = await apiFetch('/api/otp/resend', { method: 'POST' });
          console.log('OTP resent:', result);
          setSuccess('ส่ง OTP ใหม่ไปยังอีเมลของคุณแล้ว');
          setTimeout(() => setSuccess(''), 5000);
        } catch (err) {
          console.error('OTP resend error:', err);
          setError(err.message || 'ไม่สามารถส่ง OTP ได้');
        } finally {
          setSendingOtp(false);
        }
      }

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        if (!otpVerified) return setError('กรุณายืนยัน OTP ก่อนเปลี่ยนรหัสผ่าน');
        if (newPass !== confirm) return setError('รหัสผ่านใหม่และยืนยันไม่ตรงกัน');
        if (newPass.length < 6) return setError('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
        setLoading(true);
        try {
          const result = await apiFetch('/api/auth/change-password', {
            method: 'POST',
            body: { currentPassword: current, newPassword: newPass, confirmPassword: confirm, otpToken },
          });
          console.log('Password change result:', result);
          // Force redirect without checking user state again
          if (user?.role === 'admin') {
            location.href = '/admin/dashboard.html';
          } else {
            location.href = '/dashboard.html';
          }
        } catch (err) {
          console.error('Password change error:', err);
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <main id="main-content" role="main">
          <div className="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
          <div className="text-center mb-6">
            <div className="text-4xl mb-2">🔑</div>
            <h1 className="text-xl font-bold text-gray-800">ตั้งรหัสผ่านใหม่</h1>
            <p className="text-sm text-gray-500 mt-1">
              {user?.forceChangePassword
                ? 'กรุณาเปลี่ยนรหัสผ่านก่อนใช้งานระบบ'
                : 'เปลี่ยนรหัสผ่านของคุณ'}
            </p>
          </div>

          {error && (
            <div id="password-error" className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-4" role="alert">
              {error}
            </div>
          )}

          {success && (
            <div className="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm mb-4" role="alert">
              {success}
            </div>
          )}

          {/* OTP Section */}
          {!otpVerified ? (
            <div className="space-y-4">
              <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                <p className="text-sm text-blue-800">
                  เพื่อความปลอดภัย กรุณายืนยันตัวตนผ่าน OTP ที่ส่งไปยังอีเมลของคุณ
                </p>
              </div>

              {!otpSent ? (
                <button
                  onClick={handleSendOTP}
                  disabled={sendingOtp}
                  className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-semibold py-2 rounded-lg transition">
                  {sendingOtp ? 'กำลังส่ง OTP...' : 'ส่ง OTP'}
                </button>
              ) : (
                <form onSubmit={handleVerifyOTP} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">รหัส OTP (6 หลัก)</label>
                    <input 
                      type="text" 
                      value={otp} 
                      onChange={e => setOtp(e.target.value.replace(/\D/g, '').slice(0, 6))}
                      placeholder="123456"
                      maxLength={6}
                      required
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-center text-2xl tracking-widest"
                    />
                  </div>
                  <button
                    type="submit"
                    disabled={verifyingOtp}
                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-semibold py-2 rounded-lg transition">
                    {verifyingOtp ? 'กำลังตรวจสอบ...' : 'ยืนยัน OTP'}
                  </button>
                  <button
                    type="button"
                    onClick={handleResendOTP}
                    disabled={sendingOtp}
                    className="w-full text-blue-600 hover:text-blue-700 disabled:text-blue-300 text-sm font-medium py-2 transition">
                    {sendingOtp ? 'กำลังส่งใหม่...' : 'ส่ง OTP ใหม่'}
                  </button>
                </form>
              )}
            </div>
          ) : (
            /* Password Change Form */
            <form onSubmit={handleSubmit} className="space-y-4" aria-describedby="password-error">
              {!user?.forceChangePassword && (
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านปัจจุบัน</label>
                  <input type="password" value={current} onChange={e => setCurrent(e.target.value)} required
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
                </div>
              )}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)</label>
                <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} required minLength={6}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">ยืนยันรหัสผ่านใหม่</label>
                <input type="password" value={confirm} onChange={e => setConfirm(e.target.value)} required
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
              </div>
              <button
                type="submit"
                disabled={loading}
                className="w-full bg-primary-600 hover:bg-primary-700 disabled:bg-primary-300 text-white font-semibold py-2 rounded-lg transition"
                aria-label="บันทึกรหัสผ่านใหม่">
                {loading ? 'กำลังบันทึก...' : 'บันทึกรหัสผ่านใหม่'}
              </button>
            </form>
          )}
        </div>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ChangePasswordPage />);
  </script>
</body>
</html>
