<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เปลี่ยนรหัสผ่าน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/theme.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ChangePasswordPage() {
      const [user, setUser]             = useState(null);
      const [newPass, setNewPass]       = useState('');
      const [confirm, setConfirm]       = useState('');
      const [current, setCurrent]       = useState('');
      const [error, setError]           = useState('');
      const [success, setSuccess]       = useState('');
      const [loading, setLoading]       = useState(false);

      const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));

      useEffect(() => {
        apiFetch('/api/auth/me')
          .then(({ user }) => setUser(user))
          .catch(() => { location.href = '/login.html'; });

        const handleThemeChange = (e) => {
          setIsDark(document.documentElement.classList.contains('dark'));
        };
        window.addEventListener('themeChanged', handleThemeChange);

        return () => {
          window.removeEventListener('themeChanged', handleThemeChange);
        };
      }, []);

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        if (newPass !== confirm) return setError('รหัสผ่านใหม่และยืนยันไม่ตรงกัน');
        if (newPass.length < 6) return setError('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
        setLoading(true);
        try {
          const result = await apiFetch('/api/auth/change-password', {
            method: 'POST',
            body: { currentPassword: current, newPassword: newPass, confirmPassword: confirm },
          });
          console.log('Password change result:', result);
          sessionStorage.setItem('showHolidayPopup', 'true');
          if (user?.role === 'admin') {
            location.href = '/admin/dashboard.html';
          } else {
            location.href = '/dashboard.html';
          }
        } catch (err) {
          console.error('Password change error:', err);
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <main id="main-content" role="main" className="relative">
          {/* Theme Toggle Button */}
          <div className="absolute top-4 right-4 z-50">
            <button 
              onClick={() => window.toggleTheme()} 
              className="text-gray-500 hover:text-blue-600 transition p-2.5 bg-white shadow-md border rounded-xl hover:shadow-lg"
              aria-label="เปลี่ยนธีม"
            >
              {isDark ? (
                <svg className="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
              ) : (
                <svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
              )}
            </button>
          </div>
          <div className="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
          <div className="text-center mb-6">
            <div className="text-4xl mb-2">🔑</div>
            <h1 className="text-xl font-bold text-gray-800">ตั้งรหัสผ่านใหม่</h1>
            <p className="text-sm text-gray-500 mt-1">
              {user?.forceChangePassword
                ? 'กรุณาเปลี่ยนรหัสผ่านก่อนใช้งานระบบ'
                : 'เปลี่ยนรหัสผ่านของคุณ'}
            </p>
          </div>

          {error && (
            <div id="password-error" className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-4" role="alert">
              {error}
            </div>
          )}

          {success && (
            <div className="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm mb-4" role="alert">
              {success}
            </div>
          )}

            <form onSubmit={handleSubmit} className="space-y-4" aria-describedby="password-error">
              {!user?.forceChangePassword && (
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านปัจจุบัน</label>
                  <input type="password" value={current} onChange={e => setCurrent(e.target.value)} required
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
                </div>
              )}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)</label>
                <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} required minLength={6}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">ยืนยันรหัสผ่านใหม่</label>
                <input type="password" value={confirm} onChange={e => setConfirm(e.target.value)} required
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
              </div>
              <button
                type="submit"
                disabled={loading}
                className="w-full bg-primary-600 hover:bg-primary-700 disabled:bg-primary-300 text-white font-semibold py-2 rounded-lg transition"
                aria-label="บันทึกรหัสผ่านใหม่">
                {loading ? 'กำลังบันทึก...' : 'บันทึกรหัสผ่านใหม่'}
              </button>
            </form>
        </div>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ChangePasswordPage />);
  </script>
</body>
</html>
