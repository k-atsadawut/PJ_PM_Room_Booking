<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แจ้งซ่อม — ระบบจองห้อง</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function MaintenancePage() {
      const [user, setUser] = useState(null);
      const [rooms, setRooms] = useState([]);
      const [reports, setReports] = useState([]);
      const [roomId, setRoomId] = useState('');
      const [description, setDescription] = useState('');
      const [urgency, setUrgency] = useState('normal');
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        loadRooms();
        loadReports();
        checkLogin();
      }, []);

      async function checkLogin() {
        try {
          const u = await apiFetch('/api/auth/me');
          if (u && (u.user.role === 'student' || u.user.role === 'teacher' || u.user.role === 'admin')) {
            setUser(u.user);
          } else {
            window.location.href = '/login.html';
          }
        } catch (e) {
          window.location.href = '/login.html';
        }
      }

      async function loadRooms() {
        try {
          const r = await apiFetch('/api/rooms');
          setRooms(r || []);
        } catch (e) {
          console.error('Load rooms error:', e);
        }
      }

      async function loadReports() {
        try {
          const r = await apiFetch('/api/maintenance');
          setReports(r || []);
        } catch (e) {
          console.error('Load reports error:', e);
        }
      }

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        setSuccess('');
        setLoading(true);

        try {
          const res = await apiFetch('/api/maintenance', {
            method: 'POST',
            body: JSON.stringify({ roomId, description, urgency }),
          });

          if (res.success) {
            setSuccess('แจ้งซ่อมสำเร็จ');
            setRoomId('');
            setDescription('');
            setUrgency('normal');
            loadReports();
          } else {
            setError(res.error || 'แจ้งซ่อมไม่สำเร็จ');
          }
        } catch (e) {
          setError('เกิดข้อผิดพลาด กรุณาลองใหม่');
        } finally {
          setLoading(false);
        }
      }

      const urgencyLabel = {
        low: 'ต่ำ',
        normal: 'ปกติ',
        high: 'สูง',
        urgent: 'เร่งด่วน',
      };

      const statusLabel = {
        pending: 'รอดำเนินการ',
        in_progress: 'กำลังดำเนินการ',
        completed: 'เสร็จสิ้น',
        rejected: 'ถูกปฏิเสธ',
      };

      const statusColor = {
        pending: 'bg-yellow-100 text-yellow-700',
        in_progress: 'bg-primary-100 text-primary-700',
        completed: 'bg-green-100 text-green-700',
        rejected: 'bg-red-100 text-red-700',
      };

      if (!user) return <div className="p-8 text-center">กำลังโหลด...</div>;

      return (
        <main id="main-content" role="main">
          <div className="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
              <h1 className="text-2xl font-bold text-gray-800">แจ้งซ่อมห้อง</h1>
              <button
                onClick={() => window.location.href = '/dashboard.html'}
                className="text-primary-600 hover:text-primary-800 text-sm"
                aria-label="กลับไปหน้าแดชบอร์ด">
                ← กลับหน้าหลัก
              </button>
            </div>

            {/* ฟอร์มแจ้งซ่อม */}
            <div className="bg-white rounded-lg shadow p-4 sm:p-6 mb-6">
              <h2 className="text-lg font-semibold mb-4">แจ้งปัญหาใหม่</h2>
              <form onSubmit={handleSubmit} className="space-y-4" aria-describedby="maintenance-error">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">ห้อง</label>
                  <select
                    value={roomId}
                    onChange={(e) => setRoomId(e.target.value)}
                    className="w-full border rounded-lg px-3 py-2 text-sm sm:text-base"
                    required
                  >
                    <option value="">เลือกห้อง</option>
                    {rooms.map((room) => (
                      <option key={room.RoomID} value={room.RoomID}>
                        {room.RoomName}
                      </option>
                    ))}
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">รายละเอียดปัญหา</label>
                  <textarea
                    value={description}
                    onChange={(e) => setDescription(e.target.value)}
                    className="w-full border rounded-lg px-3 py-2 text-sm sm:text-base"
                    rows="4"
                    required
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">ความเร่งด่วน</label>
                  <select
                    value={urgency}
                    onChange={(e) => setUrgency(e.target.value)}
                    className="w-full border rounded-lg px-3 py-2 text-sm sm:text-base"
                  >
                    <option value="low">ต่ำ</option>
                    <option value="normal">ปกติ</option>
                    <option value="high">สูง</option>
                    <option value="urgent">เร่งด่วน</option>
                  </select>
                </div>

                {error && <div id="maintenance-error" className="text-red-600 text-sm" role="alert">{error}</div>}
                {success && <div className="text-green-600 text-sm">{success}</div>}

                <button
                  type="submit"
                  disabled={loading}
                  className="w-full bg-primary-600 text-white py-2 sm:py-3 rounded-lg hover:bg-primary-700 disabled:bg-gray-400 text-sm sm:text-base font-medium"
                >
                  {loading ? 'กำลังส่ง...' : 'ส่งรายงาน'}
                </button>
              </form>
            </div>

            {/* ประวัติการแจ้งซ่อม */}
            <div className="bg-white rounded-lg shadow p-4 sm:p-6">
              <h2 className="text-lg font-semibold mb-4">ประวัติการแจ้งซ่อมของคุณ</h2>
              {reports.length === 0 ? (
                <p className="text-gray-500 text-sm sm:text-base">ไม่มีรายงานการแจ้งซ่อม</p>
              ) : (
                <div className="space-y-3">
                  {reports.map((report) => (
                    <div key={report.ReportID} className="border rounded-lg p-3 sm:p-4">
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-2">
                        <div>
                          <h3 className="font-medium text-sm sm:text-base">{report.RoomName}</h3>
                          <p className="text-xs sm:text-sm text-gray-500">
                            {new Date(report.ReportDate).toLocaleString('th-TH')}
                          </p>
                        </div>
                        <span className={`px-2 py-1 rounded text-xs ${statusColor[report.Status]}`}>
                          {statusLabel[report.Status]}
                        </span>
                      </div>
                      <p className="text-gray-700 text-sm sm:text-base">{report.Description}</p>
                      {report.Notes && (
                        <p className="text-xs sm:text-sm text-gray-500 mt-2">
                          <strong>หมายเหตุ:</strong> {report.Notes}
                        </p>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
          </main>
   
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MaintenancePage />);
  </script>
</body>
</html>
