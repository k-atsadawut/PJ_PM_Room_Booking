<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แจ้งซ่อม — ระบบจองห้องผลิตสื่อดิจิทัล</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/theme.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 min-h-screen transition-colors">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = {
      Camera:  (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
      Wrench:  (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
      Alert:   (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Check:   (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Chevron: (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
      Sun:     (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" /></svg>,
      Moon:    (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
    };

    const MAINT_LABEL = {
      pending:     { label: 'รอดำเนินการ',   badge: 'app-badge-yellow' },
      in_progress: { label: 'กำลังดำเนินการ', badge: 'app-badge-blue' },
      completed:   { label: 'เสร็จสิ้น',      badge: 'app-badge-green' },
      rejected:    { label: 'ถูกปฏิเสธ',     badge: 'app-badge-red' },
    };

    function MaintenancePage() {
      const [user, setUser]         = useState(null);
      const [rooms, setRooms]       = useState([]);
      const [reports, setReports]   = useState([]);
      const [roomId, setRoomId]     = useState('');
      const [description, setDescription] = useState('');
      const [urgency, setUrgency]   = useState('normal');
      const [error, setError]       = useState('');
      const [success, setSuccess]   = useState('');
      const [loading, setLoading]   = useState(false);
      const [isDark, setIsDark]     = useState(document.documentElement.classList.contains('dark'));

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const pRoomId = urlParams.get('roomId');
        if (pRoomId) setRoomId(pRoomId);

        requireLogin(['student', 'teacher', 'admin']).then(u => { if (u) { setUser(u); loadReports(); } });
        loadRooms();

        const handleThemeChange = () => setIsDark(document.documentElement.classList.contains('dark'));
        window.addEventListener('themeChanged', handleThemeChange);
        return () => window.removeEventListener('themeChanged', handleThemeChange);
      }, []);

      async function loadRooms() {
        try { setRooms(await apiFetch('/api/rooms')); } catch {}
      }
      async function loadReports() {
        try { setReports(await apiFetch('/api/maintenance')); } catch {}
      }

      async function handleSubmit(e) {
        e.preventDefault();
        setError(''); setSuccess('');
        if (!roomId) { setError('กรุณาเลือกห้อง'); return; }
        if (!description.trim()) { setError('กรุณาอธิบายปัญหา'); return; }
        setLoading(true);
        try {
          const res = await apiFetch('/api/maintenance', {
            method: 'POST',
            body: { roomId, description, urgency },
          });
          if (res.success) {
            setSuccess('แจ้งซ่อมสำเร็จ — ฝ่ายดูแลระบบจะตรวจสอบและดำเนินการโดยเร็ว');
            setDescription('');
            setUrgency('normal');
            // Keep roomId for follow-up reports; user can clear manually.
            loadReports();
            setTimeout(() => setSuccess(''), 5000);
          } else {
            setError(res.error || 'แจ้งซ่อมไม่สำเร็จ');
          }
        } catch (e) {
          setError(e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
        } finally {
          setLoading(false);
        }
      }

      if (!user) return <div className="text-center mt-20 text-gray-400">กำลังโหลด...</div>;

      return (
        <div className="min-h-screen">
          {/* Navbar */}
          <header role="banner" className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-3 flex items-center justify-between shadow-sm sticky top-0 z-40 transition-colors">
            <div className="flex items-center gap-3">
              <div className="app-logo-gradient-sm w-9 h-9 rounded-xl flex items-center justify-center">
                <Icon.Camera className="w-5 h-5 text-white" />
              </div>
              <div className="text-sm font-semibold text-gray-800 dark:text-gray-100">ระบบจองห้องผลิตสื่อดิจิทัล</div>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={() => window.toggleTheme()}
                className="w-9 h-9 rounded-full flex items-center justify-center bg-gray-100 dark:bg-slate-700/50 hover:bg-gray-200 dark:hover:bg-slate-700 transition"
                aria-label="สลับธีม">
                {isDark ? <Icon.Sun className="w-4 h-4 text-yellow-400" /> : <Icon.Moon className="w-4 h-4 text-slate-600" />}
              </button>
              <a href={user.role === 'admin' ? '/admin/dashboard.html' : '/dashboard.html'}
                className="inline-flex items-center gap-1 text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 transition">
                <Icon.Chevron className="w-4 h-4" />
                <span className="hidden sm:inline">กลับ</span>
              </a>
            </div>
          </header>

          <main id="main-content" role="main" className="p-6 max-w-3xl mx-auto space-y-6">
            <a href={user.role === 'admin' ? '/admin/dashboard.html' : '/dashboard.html'}
              className="inline-flex items-center gap-1.5 text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 mb-2 transition">
              <Icon.Chevron className="w-4 h-4" />
              กลับหน้าหลัก
            </a>

            <div>
              <h1 className="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
                <Icon.Wrench className="w-6 h-6 text-orange-500" />
                แจ้งซ่อมห้อง
              </h1>
              <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">แจ้งปัญหาอุปกรณ์หรือสิ่งของภายในห้องเพื่อให้ฝ่ายดูแลดำเนินการ</p>
            </div>

            {/* Form */}
            <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-6 space-y-4">
              <h2 className="font-semibold text-gray-800 dark:text-gray-100 flex items-center gap-2">
                <Icon.Wrench className="w-4 h-4 text-orange-500" />
                แจ้งปัญหาใหม่
              </h2>

              {error && (
                <div className="flex items-start gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl px-4 py-3">
                  <Icon.Alert className="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" />
                  <p className="text-sm text-red-700 dark:text-red-400">{error}</p>
                </div>
              )}
              {success && (
                <div className="flex items-start gap-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl px-4 py-3">
                  <Icon.Check className="w-4 h-4 text-green-500 mt-0.5 flex-shrink-0" />
                  <p className="text-sm text-green-700 dark:text-green-400">{success}</p>
                </div>
              )}

              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">ห้อง</label>
                  <select value={roomId} onChange={e => setRoomId(e.target.value)}
                    className="w-full px-4 py-2.5 bg-gray-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition"
                    required>
                    <option value="">เลือกห้อง</option>
                    {rooms.map(room => (
                      <option key={room.RoomID} value={room.RoomID}>{room.RoomName}</option>
                    ))}
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">รายละเอียดปัญหา</label>
                  <textarea value={description} onChange={e => setDescription(e.target.value)} rows={4}
                    className="w-full px-4 py-2.5 bg-gray-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-sm text-gray-800 dark:text-gray-100 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition resize-none"
                    placeholder="อธิบายปัญหา เช่น ไมโครโฟนขาดที่ห้อง Studio A"
                    required />
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">ระดับความเร่งด่วน</label>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    {[{ v: 'low', l: 'ต่ำ' }, { v: 'normal', l: 'ปกติ' }, { v: 'high', l: 'สูง' }, { v: 'urgent', l: 'เร่งด่วน' }].map(o => (
                      <button key={o.v} type="button" onClick={() => setUrgency(o.v)}
                        className={`py-2.5 rounded-xl text-sm font-medium transition border ${
                          urgency === o.v
                            ? o.v === 'urgent' ? 'bg-red-600 text-white border-red-600'
                              : o.v === 'high' ? 'bg-orange-500 text-white border-orange-500'
                              : o.v === 'low' ? 'bg-gray-200 dark:bg-slate-600 text-gray-700 dark:text-gray-200 border-gray-200 dark:border-slate-600'
                              : 'bg-blue-600 text-white border-blue-600'
                            : 'bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border-slate-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700'
                        }`}>
                        {o.l}
                      </button>
                    ))}
                  </div>
                </div>

                <button type="submit" disabled={loading}
                  className="app-btn-primary w-full py-3 rounded-xl font-semibold text-sm">
                  {loading ? 'กำลังส่ง...' : 'ส่งรายงาน'}
                </button>
              </form>
            </div>

            {/* History */}
            <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-6">
              <h2 className="font-semibold text-gray-800 dark:text-gray-100 mb-4">ประวัติการแจ้งซ่อมของคุณ</h2>
              {reports.length === 0 ? (
                <div className="text-center py-8 text-gray-500 dark:text-gray-400 text-sm">ยังไม่มีรายงานการแจ้งซ่อม</div>
              ) : (
                <div className="space-y-3">
                  {reports.map(report => {
                    const s = MAINT_LABEL[report.Status] || { label: report.Status, badge: 'app-badge-gray' };
                    return (
                      <div key={report.ReportID} className="border border-slate-200 dark:border-slate-700 rounded-xl p-4">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-2">
                          <div>
                            <h3 className="font-medium text-gray-800 dark:text-gray-100 text-sm">{report.RoomName}</h3>
                            <p className="text-xs text-gray-500 dark:text-gray-400">{new Date(report.ReportDate).toLocaleString('th-TH')}</p>
                          </div>
                          <div className="flex items-center gap-2">
                            {report.Urgency === 'urgent' && <span className="app-badge app-badge-red">ด่วนที่สุด</span>}
                            <span className={`app-badge ${s.badge}`}>{s.label}</span>
                          </div>
                        </div>
                        <p className="text-gray-700 dark:text-gray-300 text-sm">{report.Description}</p>
                        {report.Notes && (
                          <p className="text-xs text-gray-500 dark:text-gray-400 mt-2 bg-gray-50 dark:bg-slate-700/50 rounded-lg px-3 py-2">
                            <strong>หมายเหตุจากผู้ดูแล:</strong> {report.Notes}
                          </p>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MaintenancePage />);
  </script>
</body>
</html>
