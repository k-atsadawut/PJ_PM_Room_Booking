<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — ระบบจองห้อง</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/theme.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .nav-active {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ConfirmModal({ open, title, description, confirmText = 'ยืนยัน', cancelText = 'ยกเลิก', loading = false, onConfirm, onCancel }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden border border-slate-200">
            <div className="p-6">
              <div className="flex items-start justify-between gap-4">
                <div>
                  <h3 className="text-lg font-semibold text-gray-900">{title}</h3>
                  <p className="mt-3 text-sm leading-6 text-gray-600">{description}</p>
                </div>
                <button type="button" onClick={onCancel} className="text-gray-400 hover:text-gray-600 transition" aria-label="ปิด">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
              <div className="mt-6 flex justify-end gap-3">
                <button type="button" onClick={onCancel} className="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 transition">
                  {cancelText}
                </button>
                <button type="button" onClick={onConfirm} disabled={loading} className={`rounded-xl px-4 py-2 text-sm font-medium text-white transition ${loading ? 'bg-slate-300' : 'bg-blue-600 hover:bg-blue-700'}`}>
                  {loading ? 'กำลังดำเนินการ...' : confirmText}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ErrorBanner({ message, onClose }) {
      if (!message) return null;
      return (
        <div className="bg-red-50 border border-red-200 text-red-700 rounded-2xl px-4 py-3 mb-4 flex items-start justify-between gap-4" role="alert">
          <div>
            <p className="text-sm font-semibold">เกิดข้อผิดพลาด</p>
            <p className="mt-1 text-sm">{message}</p>
          </div>
          <button type="button" onClick={onClose} className="text-red-500 hover:text-red-700 transition" aria-label="ปิดข้อผิดพลาด">
            ×
          </button>
        </div>
      );
    }

    const STATUS = {
      pending:   { label: 'รออนุมัติ',  color: 'bg-yellow-100 text-yellow-800 border-yellow-200' },
      approved:  { label: 'อนุมัติแล้ว', color: 'bg-green-100 text-green-800 border-green-200' },
      rejected:  { label: 'ถูกปฏิเสธ',  color: 'bg-red-100 text-red-800 border-red-200' },
      cancelled: { label: 'ยกเลิกแล้ว', color: 'bg-gray-100 text-gray-600 border-gray-200' },
    };

    function AdminNav({ user, tab, setTab }) {
      const [currentTime, setCurrentTime] = useState(new Date());
      const [countdown, setCountdown] = useState({ hours: 0, minutes: 0, seconds: 0 });
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
      
      useEffect(() => {
        const timer = setInterval(() => {
          const now = new Date();
          setCurrentTime(now);
          
          // Calculate countdown to next hour
          const nextHour = new Date(now);
          nextHour.setHours(now.getHours() + 1, 0, 0, 0);
          const diff = nextHour - now;
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          setCountdown({ hours, minutes, seconds });
        }, 1000);

        const handleThemeChange = (e) => {
          setIsDark(document.documentElement.classList.contains('dark'));
        };
        window.addEventListener('themeChanged', handleThemeChange);

        return () => {
          clearInterval(timer);
          window.removeEventListener('themeChanged', handleThemeChange);
        };
      }, []);

      const links = [
        { key: 'bookings', label: 'คำขอจอง', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg> },
        { key: 'rooms',    label: 'ห้อง', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg> },
        { key: 'users',    label: 'ผู้ใช้งาน', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg> },
        { key: 'holidays', label: 'วันหยุด', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg> },
        { key: 'password-requests', label: 'คำขอลืมรหัส', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg> },
        { key: 'notify', label: 'แจ้งเตือน', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg> },
      ];
      return (
        <nav className="bg-white shadow-sm px-4 sm:px-6 py-4">
          <div className="max-w-7xl mx-auto">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                  <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </div>
                <div>
                  <span className="font-bold text-gray-800">Admin Dashboard</span>
                  <p className="text-xs text-gray-500 hidden sm:block">ระบบจองห้องผลิตสื่อดิจิทัล</p>
                </div>
              </div>
              
              {/* Desktop Navigation */}
              <div className="hidden md:flex items-center gap-2">
                {links.map(l => (
                  <button key={l.key} onClick={() => setTab(l.key)}
                    className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition ${tab === l.key ? 'nav-active' : 'text-gray-600 hover:bg-gray-100'}`}
                    aria-label={`เปลี่ยนไปยังแท็บ${l.label}`}>
                    {l.icon}
                    {l.label}
                  </button>
                ))}
              </div>

              {/* Time and User Info - Desktop */}
              <div className="hidden md:flex items-center gap-4">
                <div className="hidden lg:flex items-center gap-4 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl px-4 py-2 border border-blue-100">
                  <div className="text-center">
                    <div className="text-xs text-gray-500">เวลาปัจจุบัน</div>
                    <div className="text-sm font-bold text-gray-800">{currentTime.toLocaleTimeString('th-TH')}</div>
                  </div>
                  <div className="h-8 w-px bg-blue-200"></div>
                  <div className="text-center">
                    <div className="text-xs text-gray-500">นับถอยหลัง</div>
                    <div className="text-sm font-bold text-blue-600">
                      {String(countdown.hours).padStart(2, '0')}:{String(countdown.minutes).padStart(2, '0')}:{String(countdown.seconds).padStart(2, '0')}
                    </div>
                  </div>
                </div>
                <div className="text-right hidden sm:block">
                  <div className="text-sm font-medium text-gray-800">{user?.name}</div>
                  <div className="text-xs text-gray-500">Administrator</div>
                </div>
                <button 
                  onClick={() => window.toggleTheme()} 
                  className="text-gray-500 hover:text-blue-600 transition p-2 rounded-lg hover:bg-gray-100"
                  aria-label="เปลี่ยนธีม"
                >
                  {isDark ? (
                    <svg className="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                    </svg>
                  ) : (
                    <svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                  )}
                </button>
                <button onClick={logout} className="text-gray-500 hover:text-red-500 transition p-2" aria-label="ออกจากระบบ">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                  </svg>
                </button>
              </div>

              {/* Hamburger Menu Button */}
              <button 
                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                className="md:hidden p-2 rounded-lg hover:bg-gray-100 transition"
                aria-label="เปิดเมนู"
              >
                <svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  {mobileMenuOpen ? (
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                  ) : (
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                  )}
                </svg>
              </button>
            </div>

            {/* Mobile Menu */}
            {mobileMenuOpen && (
              <div className="md:hidden mt-4 pb-4 border-t border-gray-100 pt-4 space-y-4">
                <div className="flex flex-col gap-2">
                  {links.map(l => (
                    <button key={l.key} onClick={() => { setTab(l.key); setMobileMenuOpen(false); }}
                      className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${tab === l.key ? 'nav-active' : 'text-gray-600 hover:bg-gray-100'}`}
                      aria-label={`เปลี่ยนไปยังแท็บ${l.label}`}>
                      {l.icon}
                      {l.label}
                    </button>
                  ))}
                </div>
                <div className="border-t border-gray-100 pt-4 flex items-center justify-between gap-4">
                  <button 
                    onClick={() => window.toggleTheme()} 
                    className="flex-1 flex items-center justify-center gap-2 py-2.5 border rounded-xl hover:bg-gray-50 transition text-sm font-medium text-gray-700 bg-white"
                    aria-label="เปลี่ยนธีม"
                  >
                    {isDark ? (
                      <>
                        <svg className="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                        </svg>
                        <span>โหมดสว่าง</span>
                      </>
                    ) : (
                      <>
                        <svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                        <span>โหมดมืด</span>
                      </>
                    )}
                  </button>
                  <button 
                    onClick={logout} 
                    className="flex-1 flex items-center justify-center gap-2 py-2.5 border border-red-200 text-red-500 hover:bg-red-50 rounded-xl transition text-sm font-medium bg-white"
                    aria-label="ออกจากระบบ"
                  >
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span>ออกจากระบบ</span>
                  </button>
                </div>
              </div>
            )}
          </div>
        </nav>
      );
    }

    /* ─── Tab: Bookings ─── */
    function BookingsTab({ openConfirm, setGlobalError }) {
      const [bookings, setBookings] = useState([]);
      const [rooms, setRooms]       = useState([]);
      const [users, setUsers]       = useState([]);
      const [loading, setLoading]   = useState(true);
      const [filter, setFilter]     = useState('pending');
      const [viewBooking, setViewBooking] = useState(null);
      const [showUsageModal, setShowUsageModal] = useState(false);
      const [showSecurityModal, setShowSecurityModal] = useState(false);
      const [showNotificationsModal, setShowNotificationsModal] = useState(false);
      const [error, setError] = useState('');

      // Memoize filtered data to prevent unnecessary recalculations
      const filtered = React.useMemo(() => 
        bookings.filter(b => filter === 'all' || b.Status === filter),
        [bookings, filter]
      );

      const stats = React.useMemo(() => ({
        availableRooms: rooms.filter(r => r.Status === 'available').length,
        pending: bookings.filter(b => b.Status === 'pending').length,
        approvedToday: bookings.filter(b => b.Status === 'approved' && new Date(b.BookingDate).toDateString() === new Date().toDateString()).length,
        blockedAccounts: users.filter(u => u.failed_login_count >= 10).length,
      }), [rooms, bookings, users]);

      useEffect(() => { loadData(); }, []);

      async function loadData() {
        setLoading(true);
        try {
          const [bookingsData, roomsData, usersData] = await Promise.all([
            apiFetch('/api/admin/bookings'),
            apiFetch('/api/rooms'),
            apiFetch('/api/admin/users')
          ]);
          setBookings(bookingsData || []);
          setRooms(roomsData || []);
          setUsers(usersData || []);
        } catch (e) {
          console.error('Error loading data:', e);
          setError('ไม่สามารถโหลดข้อมูลได้: ' + (e.message || 'Unknown error'));
          setBookings([]);
          setRooms([]);
          setUsers([]);
        } finally {
          setLoading(false);
        }
      }

      async function handleApprove(bookingId) {
        // Optimistic UI Update: Instantly set status to approved for immediate responsiveness
        setBookings(prev => prev.map(b => b.BookingID === bookingId ? { ...b, Status: 'approved' } : b));
        if (viewBooking && viewBooking.BookingID === bookingId) {
          setViewBooking(prev => ({ ...prev, Status: 'approved' }));
        }
        try {
          await apiFetch(`/api/admin/bookings/${bookingId}`, {
            method: 'PATCH',
            body: { action: 'approved' }
          });
        } catch (e) {
          setGlobalError('ไม่สามารถอนุมัติการจองได้: ' + (e.message || 'Unknown error'));
          // Reload actual state from backend if it fails
          loadData();
        }
      }

      async function handleReject(bookingId) {
        // Optimistic UI Update: Instantly set status to rejected for immediate responsiveness
        setBookings(prev => prev.map(b => b.BookingID === bookingId ? { ...b, Status: 'rejected' } : b));
        if (viewBooking && viewBooking.BookingID === bookingId) {
          setViewBooking(prev => ({ ...prev, Status: 'rejected' }));
        }
        try {
          await apiFetch(`/api/admin/bookings/${bookingId}`, {
            method: 'PATCH',
            body: { action: 'rejected' }
          });
        } catch (e) {
          setGlobalError('ไม่สามารถปฏิเสธการจองได้: ' + (e.message || 'Unknown error'));
          // Reload actual state from backend if it fails
          loadData();
        }
      }

      function exportUsageData() {
        const csvContent = [
          ['BookingID', 'UserName', 'RoomName', 'BookingDate', 'StartTime', 'EndTime', 'Status'].join(','),
          ...bookings.map(b => [b.BookingID, b.UserName, b.RoomName, b.BookingDate, b.StartTime, b.EndTime, b.Status].join(','))
        ].join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `usage_data_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      return (
        <div>
          {/* Stats Cards */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm text-gray-500 mb-1">ห้องว่าง</p>
                  <p className="text-2xl font-bold text-gray-800">{stats.availableRooms}</p>
                </div>
                <div className="w-12 h-12 rounded-xl bg-green-100 flex items-center justify-center">
                  <svg className="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                </div>
              </div>
            </div>
            <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm text-gray-500 mb-1">รออนุมัติ</p>
                  <p className="text-2xl font-bold text-gray-800">{stats.pending}</p>
                </div>
                <div className="w-12 h-12 rounded-xl bg-yellow-100 flex items-center justify-center">
                  <svg className="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
              </div>
            </div>
            <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm text-gray-500 mb-1">อนุมัติวันนี้</p>
                  <p className="text-2xl font-bold text-gray-800">{stats.approvedToday}</p>
                </div>
                <div className="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center">
                  <svg className="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
              </div>
            </div>
            <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm text-gray-500 mb-1">บัญชีถูกบล็อก</p>
                  <p className="text-2xl font-bold text-gray-800">{stats.blockedAccounts}</p>
                </div>
                <div className="w-12 h-12 rounded-xl bg-red-100 flex items-center justify-center">

        try { setRooms(await apiFetch('/api/rooms')); }

            method: 'PUT',
            body: editForm

          setEditingRoom(null);

                method: 'POST',
                body: addForm

              setAddForm({ RoomName: '', Capacity: '', Status: 'available' });
              setShowAddForm(false);

    /* ─── Tab: Users ─── */

      const [users, setUsers]     = useState([]);
      const [form, setForm]       = useState({ name:'', email:'', role:'student', faculty:'', department:'' });
      const [error, setError]     = useState('');
      const [success, setSuccess] = useState('');
      const [loading, setLoading] = useState(true);
      const [creating, setCreating] = useState(false);

      useEffect(() => { loadUsers(); }, []);

      async function loadUsers() {
        try { setUsers(await apiFetch('/api/admin/users')); }
        catch (e) { setGlobalError('ไม่สามารถโหลดรายชื่อผู้ใช้ได้: ' + (e.message || 'Unknown error')); }
        finally { setLoading(false); }
      }

      async function createUser(e) {
        e.preventDefault(); setError(''); setSuccess('');
        
        // Validation
        if (!form.name.trim()) return setError('กรุณากรอกชื่อ-นามสกุล');
        if (!form.email.trim()) return setError('กรุณากรอกอีเมล');
        if (!form.email.includes('@')) return setError('รูปแบบอีเมลไม่ถูกต้อง');
        
        // Generate password from surname (last word of name)
        const nameParts = form.name.trim().split(' ');
        const surname = nameParts[nameParts.length - 1] || form.name.trim();
        const password = surname;
        
        openConfirm({
          title: 'ยืนยันการสร้างผู้ใช้ใหม่',
          description: `สร้างผู้ใช้ ${form.name} โดยรหัสผ่านเริ่มต้นจะเป็น: ${password}`,
          confirmText: 'สร้างผู้ใช้',
          cancelText: 'ยกเลิก',
          onConfirm: async () => {
            setCreating(true);
            setError('');
            setSuccess('');
            
            // Optimistic update - add to UI immediately
            const tempUser = { 
              UserID: Date.now(), 
              Name: form.name, 
              Email: form.email, 
              Role: form.role, 
              Faculty: form.faculty, 
              Department: form.department,
              force_change_password: 1
            };
            setUsers(prev => [tempUser, ...prev]);
            
            const tempForm = { 
              Name: form.name,
              Email: form.email,
              Password: password,
              Role: form.role,
              Faculty: form.faculty,
              Department: form.department
            };
            setForm({ name:'', email:'', role:'student', faculty:'', department:'' });

            try {
              const result = await apiFetch('/api/admin/users', { method: 'POST', body: tempForm });
              console.log('User created:', result);
              setSuccess('สร้างผู้ใช้สำเร็จแล้ว');
              setGlobalSuccess('สร้างผู้ใช้สำเร็จแล้ว');
              await loadUsers();
              setTimeout(() => setSuccess(''), 3000);
            } catch (err) {
              console.error('Error creating user:', err);
              setGlobalError(err.message || 'ไม่สามารถสร้างผู้ใช้ได้');
              await loadUsers();
            } finally {
              setCreating(false);
            }
          }
        });
        return;
        const tempUser = { 
          UserID: Date.now(), 
          Name: form.name, 
          Email: form.email, 
          Role: form.role, 
          Faculty: form.faculty, 
          Department: form.department,
          force_change_password: 1
        };
        setUsers(prev => [tempUser, ...prev]);
        
        const tempForm = { 
          Name: form.name,
          Email: form.email,
          Password: password,
          Role: form.role,
          Faculty: form.faculty,
          Department: form.department
        };
        setForm({ name:'', email:'', role:'student', faculty:'', department:'' });
        
        try {
          const result = await apiFetch('/api/admin/users', { method: 'POST', body: tempForm });
          console.log('User created:', result);
          setSuccess('สร้างผู้ใช้สำเร็จแล้ว');
          // Reload to get the correct data from server
          await loadUsers();
          setTimeout(() => setSuccess(''), 3000);
        } catch (err) {
          console.error('Error creating user:', err);
          setError(err.message || 'ไม่สามารถสร้างผู้ใช้ได้');
          // Rollback on error
          await loadUsers();
        } finally {
          setCreating(false);
        }
      }

      async function deleteUser(id) {
        openConfirm({
          title: 'ลบผู้ใช้งาน',
          description: 'คุณแน่ใจหรือไม่ว่าต้องการลบผู้ใช้นี้? การดำเนินการนี้ไม่สามารถย้อนกลับได้',
          confirmText: 'ลบผู้ใช้',
          cancelText: 'ยกเลิก',
          onConfirm: async () => {
            // Optimistic update - remove from UI immediately
            setUsers(prev => prev.filter(u => u.UserID !== id));
            try {
              await apiFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
            } catch (e) {
              console.error('Error deleting user:', e);
              setGlobalError('ไม่สามารถลบผู้ใช้ได้: ' + (e.message || 'Unknown error'));
              await loadUsers();
            }
          }

              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              {error}
            </div>}
            {success && <div className="bg-green-50 text-green-700 text-sm rounded-lg px-4 py-3 mb-4 flex items-center gap-2" role="alert">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              {success}

            <form onSubmit={createUser} className="grid grid-cols-1 md:grid-cols-2 gap-4" aria-describedby="user-error">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">ชื่อ-นามสกุล</label>
                <input value={form.name} onChange={e => f('name', e.target.value)} placeholder="ชื่อ-นามสกุล" required
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">อีเมล</label>
                <input value={form.email} onChange={e => f('email', e.target.value)} placeholder="อีเมล" type="email" required
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">สิทธิ์</label>
                <select value={form.role} onChange={e => f('role', e.target.value)}
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                  <option value="student">นักศึกษา</option>
                  <option value="teacher">อาจารย์</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">คณะ (ถ้ามี)</label>
                <input value={form.faculty} onChange={e => f('faculty', e.target.value)} placeholder="คณะ"
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
              </div>
              <div className="md:col-span-2">
                <button type="submit" disabled={creating}
                  className={`bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white text-sm font-medium px-6 py-2.5 rounded-xl transition`}
                  aria-label="เพิ่มผู้ใช้ใหม่">
                  {creating ? 'กำลังสร้าง...' : '+ เพิ่มผู้ใช้'}
                </button>
                <span className="text-xs text-gray-400 ml-3">รหัสผ่านเริ่มต้น = นามสกุล (ต้องเปลี่ยนเมื่อ Login ครั้งแรก)</span>
              </div>
            </form>
          </div>

          {/* ตารางผู้ใช้ */}
          <div className="bg-white rounded-2xl border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-50">
                  <tr>
                    {['ชื่อ', 'อีเมล', 'สิทธิ์', 'รหัสผ่าน', 'สถานะรหัสผ่าน', ''].map(h => (
                      <th key={h} className="text-left px-6 py-3 font-semibold text-gray-600">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {loading ? (
                    <tr><td colSpan="6" className="text-center py-8 text-gray-400">กำลังโหลด...</td></tr>
                  ) : users.map(u => (
                    <tr key={u.UserID} className="hover:bg-gray-50">
                      <td className="px-6 py-4 font-medium text-gray-800">{u.Name}</td>
                      <td className="px-6 py-4 text-gray-500">{u.Email}</td>

    /* ─── Tab: Holidays ─── */
    function HolidaysTab({ openConfirm, setGlobalError }) {
      const [holidays, setHolidays] = useState([]);
      const [date, setDate]         = useState('');
      const [desc, setDesc]         = useState('');

      useEffect(() => { loadHolidays(); }, []);

      async function loadHolidays() {
        try {
          const data = await apiFetch('/api/admin/holidays');
          console.log('Loaded holidays:', data);
          setHolidays(data || []);
        }
        catch (e) {
          console.error('Error loading holidays:', e);
          setGlobalError('ไม่สามารถโหลดวันหยุดได้: ' + (e.message || 'Unknown error'));
        }
      }

      async function addHoliday(e) {
        e.preventDefault();
        if (!date) return;

        // Optimistic UI update - add to UI immediately and sort by date descending
        const tempHoliday = { HolidayID: Date.now(), HolidayDate: date, Description: desc };
        setHolidays(prev => [tempHoliday, ...prev].sort((a, b) => new Date(b.HolidayDate) - new Date(a.HolidayDate)));
        
        const tempDate = date;
        const tempDesc = desc;
        setDate('');
        setDesc('');
        try {
          const result = await apiFetch('/api/admin/holidays', { method: 'POST', body: { HolidayDate: tempDate, Description: tempDesc } });
          console.log('Holiday added:', result);
          await loadHolidays();
        }
        catch (err) {
          console.error('Error adding holiday:', err);
          setGlobalError('ไม่สามารถเพิ่มวันหยุดได้: ' + (err.message || 'Unknown error'));
          await loadHolidays();
        }
      }

          title: 'ลบวันหยุด',

          confirmText: 'ลบวันหยุด',
          cancelText: 'ยกเลิก',
          onConfirm: async () => {
            setHolidays(prev => prev.filter(h => h.HolidayID !== id));
            try {
              await apiFetch(`/api/admin/holidays/${id}`, { method: 'DELETE' });
            }
            catch (e) {
              console.error('Error deleting holiday:', e);
              setGlobalError('ไม่สามารถลบวันหยุดได้: ' + (e.message || 'Unknown error'));
              await loadHolidays();
            }

        });

              <div className="flex-2">

              <button type="submit"
                className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-6 py-2.5 rounded-xl transition">

        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <h2 className="text-xl font-bold text-gray-800">ประวัติคำขอลืมรหัสผ่าน</h2>
            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-none whitespace-nowrap -mx-4 px-4 sm:mx-0 sm:px-0 w-full sm:w-auto">
              {['all','auto-processed','pending','approved','rejected'].map(f => (
                <button key={f} onClick={() => setFilter(f)}
                  className={`text-sm px-4 py-2 rounded-xl border transition font-medium flex-shrink-0
                    ${filter === f ? 'nav-active border-transparent' : 'bg-white text-gray-600 border-gray-300 hover:border-blue-400'}`}
                  aria-label={`กรองสถานะ${f === 'all' ? 'ทั้งหมด' : STATUS[f]?.label}`}>
                  {f === 'all' ? 'ทั้งหมด' : STATUS[f]?.label}
                </button>
              ))}
            </div>
          </div>

          {filtered.length === 0 ? (
            <div className="text-center py-16 bg-white rounded-2xl border">
              <div className="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
              </div>
              <p className="text-gray-500">ไม่มีคำขอลืมรหัสผ่าน</p>
            </div>
          ) : (
            <div className="space-y-3">
              {filtered.map(r => (
                <div key={r.RequestID} className="bg-white rounded-2xl border px-6 py-4 card-hover transition-all duration-200">
                  <div className="flex items-center gap-3 mb-2">
                    <span className={`text-xs font-medium px-3 py-1 rounded-full border ${STATUS[r.Status]?.color || 'bg-gray-100 text-gray-800 border-gray-200'}`}>
                      {STATUS[r.Status]?.label || r.Status}
                    </span>
                    <span className="text-sm text-gray-500">
                      {new Date(r.RequestDate).toLocaleString('th-TH')}
                    </span>
                  </div>
                  <div className="font-semibold text-gray-800">{r.UserName}</div>
                  <div className="text-sm text-gray-600">{r.Email}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ─── Tab: Notify (ส่งอีเมลแจ้งเตือน) ─── */
    const NOTIFY_TEMPLATES = {
      announce: {
        label: 'ประกาศทั่วไป',
        subject: 'ประกาศจากผู้ดูแลระบบ',
        body: 'เรียน ผู้ใช้งาน,\n\nเนื้อหาประกาศของคุณ...\n\nขอแสดงความนับถือ\nผู้ดูแลระบบจองห้อง',
      },
      booking: {
        label: 'แจ้งเตือนการจอง',
        subject: 'แจ้งเตือนเกี่ยวกับการจองห้อง',
        body: 'เรียน ผู้ใช้งาน,\n\nเกี่ยวกับการจองห้องของคุณ...\n\nหากมีข้อสงสัย กรุณาติดต่อเจ้าหน้าที่\n\nผู้ดูแลระบบจองห้อง',
      },
      holiday: {
        label: 'แจ้งวันหยุด/ปิดทำการ',
        subject: 'แจ้งวันหยุด/ปิดทำการ',
        body: 'เรียน ผู้ใช้งาน,\n\nขอแจ้งว่าระบบจะปิดให้บริการในวันหยุด...\n\nขออภัยในความไม่สะดวก\n\nผู้ดูแลระบบจองห้อง',
      },
    };

    function NotifyTab({ openConfirm }) {
      const [users, setUsers]       = useState([]);
      const [selected, setSelected] = useState({});   // { [UserID]: true }
      const [subject, setSubject]   = useState('');
      const [body, setBody]         = useState('');
      const [template, setTemplate] = useState('');
      const [search, setSearch]     = useState('');
      const [error, setError]       = useState('');
      const [result, setResult]     = useState(null); // { sent, failed }
      const [sending, setSending]   = useState(false);
      const [loading, setLoading]   = useState(true);

      useEffect(() => { loadUsers(); }, []);

      async function loadUsers() {
        try { setUsers(await apiFetch('/api/admin/users')); }
        catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }

      const ROLE_LABEL = { student: 'นักศึกษา', teacher: 'อาจารย์', admin: 'Admin' };

      const filtered = users.filter(u => {
        const q = search.trim().toLowerCase();
        if (!q) return true;
        return (u.Name || '').toLowerCase().includes(q) || (u.Email || '').toLowerCase().includes(q);
      });

      const selectedIds = Object.keys(selected).filter(k => selected[k]).map(Number);
      const selectedCount = selectedIds.length;

      function toggle(id) {
        setSelected(prev => ({ ...prev, [id]: !prev[id] }));
      }
      function selectByRole(role) {
        setSelected(prev => {
          const next = { ...prev };
          users.filter(u => u.Role === role).forEach(u => { next[u.UserID] = true; });
          return next;
        });
      }
      function selectAll() {
        setSelected(prev => {
          const next = { ...prev };
          users.forEach(u => { next[u.UserID] = true; });
          return next;
        });
      }
      function clearAll() { setSelected({}); }

      function applyTemplate(key) {
        setTemplate(key);
        if (key && NOTIFY_TEMPLATES[key]) {
          setSubject(NOTIFY_TEMPLATES[key].subject);
          setBody(NOTIFY_TEMPLATES[key].body);
        }
      }

      async function send(e) {
        e.preventDefault(); setError(''); setResult(null);
        if (selectedCount === 0) return setError('กรุณาเลือกผู้รับอย่างน้อย 1 คน');
        if (!subject.trim())    return setError('กรุณาระบุหัวข้ออีเมล');
        if (!body.trim())       return setError('กรุณาระบุเนื้อหาอีเมล');

        openConfirm({
          title: 'ยืนยันการส่งอีเมล',
          description: `คุณแน่ใจหรือไม่ว่าต้องการส่งอีเมลไปยัง ${selectedCount} คน?`,
          confirmText: 'ส่งอีเมล',
          cancelText: 'ยกเลิก',
          onConfirm: async () => {
            setSending(true);
            try {
              const res = await apiFetch('/api/admin/notify/send', {
                method: 'POST',
                body: { to: selectedIds, subject, body },
              });
              setResult(res);
            } catch (err) {
              setError(err.message || 'ส่งอีเมลไม่สำเร็จ');
            } finally {
              setSending(false);
            }
          }
        });
      }

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-2xl border p-6">
            <h3 className="font-semibold text-gray-800 mb-4">ส่งอีเมลแจ้งเตือน</h3>

            {error && <div className="bg-red-50 text-red-700 text-sm rounded-lg px-4 py-3 mb-4" role="alert">{error}</div>}
            {result && (
              <div className="bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-4" role="alert">
                ส่งสำเร็จ {result.sent} คน
                {result.failed?.length > 0 && ` · ล้มเหลว ${result.failed.length} คน`}
                {result.failed?.length > 0 && (
                  <ul className="mt-2 list-disc list-inside text-red-700">
                    {result.failed.map((f, i) => <li key={i}>{f.email}: {f.error}</li>)}
                  </ul>
                )}
              </div>
            )}

            {/* ส่วนเลือกผู้รับ */}
            <div className="mb-6">
              <div className="flex items-center justify-between mb-3">
                <label className="block text-sm font-medium text-gray-700">
                  เลือกผู้รับ <span className="text-blue-600 font-semibold">({selectedCount} คน)</span>
                </label>
                <div className="flex flex-wrap gap-2">
                  <button type="button" onClick={selectAll} className="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">เลือกทั้งหมด</button>
                  <button type="button" onClick={() => selectByRole('student')} className="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">เฉพาะนักศึกษา</button>
                  <button type="button" onClick={() => selectByRole('teacher')} className="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">เฉพาะอาจารย์</button>
                  <button type="button" onClick={clearAll} className="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">ล้างการเลือก</button>
                </div>
              </div>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="ค้นหาชื่อหรืออีเมล..."
                className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
              <div className="border border-gray-200 rounded-xl max-h-64 overflow-y-auto">
                {loading ? (
                  <div className="p-4 text-sm text-gray-400 text-center">กำลังโหลด...</div>
                ) : filtered.length === 0 ? (
                  <div className="p-4 text-sm text-gray-400 text-center">ไม่พบผู้ใช้</div>
                ) : filtered.map(u => (
                  <label key={u.UserID} className="flex items-center gap-3 px-4 py-2.5 border-b border-gray-100 last:border-0 hover:bg-gray-50 cursor-pointer">
                    <input type="checkbox" checked={!!selected[u.UserID]} onChange={() => toggle(u.UserID)} className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500" />
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium text-gray-800 truncate">{u.Name}</div>
                      <div className="text-xs text-gray-500 truncate">{u.Email}</div>
                    </div>
                    <span className="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">{ROLE_LABEL[u.Role] || u.Role}</span>
                  </label>
                ))}
              </div>
            </div>

            {/* ส่วนเขียนอีเมล */}
            <form onSubmit={send} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">เทมเพลต</label>
                <select value={template} onChange={e => applyTemplate(e.target.value)}
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">— ไม่ใช้เทมเพลต —</option>
                  {Object.entries(NOTIFY_TEMPLATES).map(([k, t]) => <option key={k} value={k}>{t.label}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">หัวข้ออีเมล</label>
                <input value={subject} onChange={e => setSubject(e.target.value)} placeholder="หัวข้ออีเมล" required
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">เนื้อหาอีเมล</label>
                <textarea value={body} onChange={e => setBody(e.target.value)} placeholder="เนื้อหาอีเมล..." required rows={8}
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              </div>
              <div className="flex items-center gap-3">
                <button type="submit" disabled={sending || selectedCount === 0}
                  className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white text-sm font-medium px-6 py-2.5 rounded-xl transition">
                  {sending ? 'กำลังส่ง...' : `ส่งอีเมล (หา ${selectedCount} คน)`}
                </button>
                <span className="text-xs text-gray-400">ส่งแบบ plain text ผ่าน Resend</span>
              </div>
            </form>
          </div>
        </div>
      );
    }

    /* ─── Main ─── */
    function AdminDashboard() {
      const [user, setUser] = useState(null);
      const [tab, setTab]   = useState('bookings');
      const [confirmState, setConfirmState] = useState({
        open: false,
        title: '',
        description: '',
        confirmText: 'ยืนยัน',
        cancelText: 'ยกเลิก',
        loading: false,
        onConfirm: null,
      });
      const [globalError, setGlobalError] = useState('');
      const [globalSuccess, setGlobalSuccess] = useState('');

      useEffect(() => {
        requireLogin(['admin']).then(u => { if (u) setUser(u); });
      }, []);

      function openConfirm({ title, description, confirmText = 'ยืนยัน', cancelText = 'ยกเลิก', onConfirm }) {
        setConfirmState({ open: true, title, description, confirmText, cancelText, loading: false, onConfirm });
      }

      function closeConfirm() {
        setConfirmState(prev => ({ ...prev, open: false, loading: false, onConfirm: null }));
      }

      async function handleConfirm() {
        if (!confirmState.onConfirm) {
          closeConfirm();
          return;
        }
        setConfirmState(prev => ({ ...prev, loading: true }));
        try {
          await confirmState.onConfirm();
        } finally {
          closeConfirm();
        }
      }

      if (!user) return <div className="text-center mt-20 text-gray-400">กำลังโหลด...</div>;

      return (
        <div>
          <header role="banner">
            <AdminNav user={user} tab={tab} setTab={setTab} />
          </header>
          <main id="main-content" role="main" className="max-w-7xl mx-auto px-4 py-8">
            {globalError && <ErrorBanner message={globalError} onClose={() => setGlobalError('')} />}
            {globalSuccess && (
              <div className="bg-green-50 border border-green-200 text-green-700 rounded-2xl px-4 py-3 mb-6" role="status">
                {globalSuccess}
              </div>
            )}
            {tab === 'bookings' && <BookingsTab openConfirm={openConfirm} setGlobalError={setGlobalError} />}
            {tab === 'rooms'    && <RoomsTab openConfirm={openConfirm} setGlobalError={setGlobalError} />}
            {tab === 'users'    && <UsersTab openConfirm={openConfirm} setGlobalError={setGlobalError} setGlobalSuccess={setGlobalSuccess} />}
            {tab === 'holidays' && <HolidaysTab openConfirm={openConfirm} setGlobalError={setGlobalError} />}
            {tab === 'password-requests' && <PasswordRequestsTab openConfirm={openConfirm} setGlobalError={setGlobalError} setGlobalSuccess={setGlobalSuccess} />}
            {tab === 'notify' && <NotifyTab openConfirm={openConfirm} setGlobalError={setGlobalError} setGlobalSuccess={setGlobalSuccess} />}
          </main>

          <ConfirmModal
            open={confirmState.open}
            title={confirmState.title}
            description={confirmState.description}
            confirmText={confirmState.confirmText}
            cancelText={confirmState.cancelText}
            loading={confirmState.loading}
            onConfirm={handleConfirm}
            onCancel={closeConfirm}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AdminDashboard />);
  </script>
</body>
</html>
