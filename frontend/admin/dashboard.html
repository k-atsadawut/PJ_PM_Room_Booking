<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — ระบบจองห้อง</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .nav-active {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const STATUS = {
      pending:   { label: 'รออนุมัติ',  color: 'bg-yellow-100 text-yellow-800 border-yellow-200' },
      approved:  { label: 'อนุมัติแล้ว', color: 'bg-green-100 text-green-800 border-green-200' },
      rejected:  { label: 'ถูกปฏิเสธ',  color: 'bg-red-100 text-red-800 border-red-200' },
      cancelled: { label: 'ยกเลิกแล้ว', color: 'bg-gray-100 text-gray-600 border-gray-200' },
    };

    function AdminNav({ user, tab, setTab }) {
      const [currentTime, setCurrentTime] = useState(new Date());
      const [countdown, setCountdown] = useState({ hours: 0, minutes: 0, seconds: 0 });
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      
      useEffect(() => {
        const timer = setInterval(() => {
          const now = new Date();
          setCurrentTime(now);
          
          // Calculate countdown to next hour
          const nextHour = new Date(now);
          nextHour.setHours(now.getHours() + 1, 0, 0, 0);
          const diff = nextHour - now;
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          setCountdown({ hours, minutes, seconds });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      const links = [
        { key: 'bookings', label: 'คำขอจอง', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg> },
        { key: 'rooms',    label: 'ห้อง', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg> },
        { key: 'users',    label: 'ผู้ใช้งาน', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg> },
        { key: 'holidays', label: 'วันหยุด', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg> },
        { key: 'password-requests', label: 'คำขอลืมรหัส', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg> },
      ];
      return (
        <nav className="bg-white shadow-sm px-4 sm:px-6 py-4">
          <div className="max-w-7xl mx-auto">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                  <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </div>
                <div>
                  <span className="font-bold text-gray-800">Admin Dashboard</span>
                  <p className="text-xs text-gray-500 hidden sm:block">ระบบจองห้องผลิตสื่อดิจิทัล</p>
                </div>
              </div>
              
              {/* Desktop Navigation */}
              <div className="hidden md:flex items-center gap-2">
                {links.map(l => (
                  <button key={l.key} onClick={() => setTab(l.key)}
                    className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition ${tab === l.key ? 'nav-active' : 'text-gray-600 hover:bg-gray-100'}`}
                    aria-label={`เปลี่ยนไปยังแท็บ${l.label}`}>
                    {l.icon}
                    {l.label}
                  </button>
                ))}
              </div>

              {/* Time and User Info - Desktop */}
              <div className="hidden md:flex items-center gap-4">
                <div className="hidden lg:flex items-center gap-4 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl px-4 py-2 border border-blue-100">
                  <div className="text-center">
                    <div className="text-xs text-gray-500">เวลาปัจจุบัน</div>
                    <div className="text-sm font-bold text-gray-800">{currentTime.toLocaleTimeString('th-TH')}</div>
                  </div>
                  <div className="h-8 w-px bg-blue-200"></div>
                  <div className="text-center">
                    <div className="text-xs text-gray-500">นับถอยหลัง</div>
                    <div className="text-sm font-bold text-blue-600">
                      {String(countdown.hours).padStart(2, '0')}:{String(countdown.minutes).padStart(2, '0')}:{String(countdown.seconds).padStart(2, '0')}
                    </div>
                  </div>
                </div>
                <div className="text-right hidden sm:block">
                  <div className="text-sm font-medium text-gray-800">{user?.name}</div>
                  <div className="text-xs text-gray-500">Administrator</div>
                </div>
                <button onClick={logout} className="text-gray-500 hover:text-red-500 transition p-2" aria-label="ออกจากระบบ">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                  </svg>
                </button>
              </div>

              {/* Hamburger Menu Button */}
              <button 
                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                className="md:hidden p-2 rounded-lg hover:bg-gray-100 transition"
                aria-label="เปิดเมนู"
              >
                <svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  {mobileMenuOpen ? (
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                  ) : (
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                  )}
                </svg>
              </button>
            </div>

            {/* Mobile Menu */}
            {mobileMenuOpen && (
              <div className="md:hidden mt-4 pb-4 border-t border-gray-100 pt-4">
                <div className="flex flex-col gap-2">
                  {links.map(l => (
                    <button key={l.key} onClick={() => { setTab(l.key); setMobileMenuOpen(false); }}
                      className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${tab === l.key ? 'nav-active' : 'text-gray-600 hover:bg-gray-100'}`}
                      aria-label={`เปลี่ยนไปยังแท็บ${l.label}`}>
                      {l.icon}
                      {l.label}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </nav>
      );
    }

    /* ─── Tab: Bookings ─── */
    function BookingsTab() {
      const [bookings, setBookings] = useState([]);
      const [rooms, setRooms]       = useState([]);
      const [users, setUsers]       = useState([]);
      const [loading, setLoading]   = useState(true);
      const [filter, setFilter]     = useState('pending');
      const [viewBooking, setViewBooking] = useState(null);
      const [showUsageModal, setShowUsageModal] = useState(false);
      const [showSecurityModal, setShowSecurityModal] = useState(false);
      const [showNotificationsModal, setShowNotificationsModal] = useState(false);

      // Memoize filtered data to prevent unnecessary recalculations
      const filtered = React.useMemo(() => 
        bookings.filter(b => filter === 'all' || b.Status === filter),
        [bookings, filter]
      );

      const stats = React.useMemo(() => ({
        availableRooms: rooms.filter(r => r.Status === 'available').length,
        pending: bookings.filter(b => b.Status === 'pending').length,
        approvedToday: bookings.filter(b => b.Status === 'approved' && new Date(b.BookingDate).toDateString() === new Date().toDateString()).length,
        blockedAccounts: users.filter(u => u.failed_login_count >= 10).length,
      }), [rooms, bookings, users]);

      useEffect(() => { loadData(); }, []);

      async function loadData() {
        setLoading(true);
        try {
          const [bookingsData, roomsData, usersData] = await Promise.all([
            apiFetch('/api/admin/bookings'),
            apiFetch('/api/rooms'),
            apiFetch('/api/admin/users')
          ]);
          setBookings(bookingsData || []);
          setRooms(roomsData || []);
          setUsers(usersData || []);
        } catch (e) {
          console.error('Error loading data:', e);
          alert('ไม่สามารถโหลดข้อมูลได้: ' + (e.message || 'Unknown error'));
          setBookings([]);
          setRooms([]);
          setUsers([]);
        } finally {
          setLoading(false);
        }
      }

      function exportUsageData() {
        const csvContent = [
          ['BookingID', 'UserName', 'RoomName', 'BookingDate', 'StartTime', 'EndTime', 'Status'].join(','),
          ...bookings.map(b => [b.BookingID, b.UserName, b.RoomName, b.BookingDate, b.StartTime, b.EndTime, b.Status].join(','))
        ].join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `usage_data_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      return (
        <div>
          {/* Stats Cards */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm text-gray-500 mb-1">ห้องว่าง</p>
                  <p className="text-2xl font-bold text-gray-800">{stats.availableRooms}</p>
                </div>
                <div className="w-12 h-12 rounded-xl bg-green-100 flex items-center justify-center">
                  <svg className="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                </div>
              </div>
            </div>
            <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm text-gray-500 mb-1">รออนุมัติ</p>
                  <p className="text-2xl font-bold text-gray-800">{stats.pending}</p>
                </div>
                <div className="w-12 h-12 rounded-xl bg-yellow-100 flex items-center justify-center">
                  <svg className="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
              </div>
            </div>
            <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm text-gray-500 mb-1">อนุมัติวันนี้</p>
                  <p className="text-2xl font-bold text-gray-800">{stats.approvedToday}</p>
                </div>
                <div className="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center">
                  <svg className="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
              </div>
            </div>
            <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm text-gray-500 mb-1">บัญชีถูกบล็อก</p>
                  <p className="text-2xl font-bold text-gray-800">{stats.blockedAccounts}</p>
                </div>
                <div className="w-12 h-12 rounded-xl bg-red-100 flex items-center justify-center">
                  <svg className="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </div>
              </div>
            </div>
          </div>

          {/* Real-time Room Status */}
          <div className="mb-6">
            <h3 className="text-lg font-bold text-gray-800 mb-4">สถานะห้องแบบเรียลไทม์</h3>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              {rooms.slice(0, 4).map(room => {
                const currentBooking = bookings.find(b => 
                  b.Status === 'approved' && 
                  b.RoomID === room.RoomID && 
                  new Date(b.BookingDate).toDateString() === new Date().toDateString()
                );
                const statusConfig = {
                  available: { 
                    label: 'ว่าง', 
                    bg: 'bg-green-100', 
                    text: 'text-green-800',
                    icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                  },
                  booked: { 
                    label: 'ไม่ว่าง', 
                    bg: 'bg-red-100', 
                    text: 'text-red-800',
                    icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  },
                  maintenance: { 
                    label: 'ปิดปรับปรุง', 
                    bg: 'bg-yellow-100', 
                    text: 'text-yellow-800',
                    icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                  }
                };
                const config = statusConfig[room.Status] || statusConfig.available;
                
                return (
                  <div key={room.RoomID} className="bg-white rounded-2xl border p-4 card-hover transition-all duration-200">
                    <div className="flex items-start justify-between mb-3">
                      <div>
                        <h4 className="font-semibold text-gray-800 text-sm">{room.RoomName}</h4>
                        <p className="text-xs text-gray-500 mt-1">ความจุ {room.Capacity} คน</p>
                      </div>
                      <div className={`px-2 py-1 rounded-full text-xs font-medium ${config.bg} ${config.text}`}>
                        {config.label}
                      </div>
                    </div>
                    
                    {currentBooking && (
                      <div className="bg-red-50 rounded-xl p-2 mb-2">
                        <div className="flex items-center gap-2 text-xs text-red-700">
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                          </svg>
                          <span className="font-medium">{currentBooking.UserName}</span>
                        </div>
                        <p className="text-xs text-red-600 mt-1">{currentBooking.StartTime}–{currentBooking.EndTime}</p>
                      </div>
                    )}
                    
                    {room.bookings_today?.length > 0 && !currentBooking && (
                      <div className="space-y-1 mb-2">
                        {room.bookings_today.slice(0, 2).map((bk, i) => (
                          <div key={i} className="flex items-center justify-between text-xs bg-gray-50 rounded-lg px-2 py-1">
                            <span className="text-gray-600">{bk.start} - {bk.end}</span>
                            <span className={`px-1.5 py-0.5 rounded-full ${STATUS[bk.status]?.color}`}>
                              {STATUS[bk.status]?.label}
                            </span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Recent Notifications */}
          <div className="mb-6">
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-lg font-bold text-gray-800">การแจ้งเตือนล่าสุด</h3>
              <span onClick={() => setShowNotificationsModal(true)} className="text-sm text-blue-600 hover:text-blue-700 cursor-pointer">ดูทั้งหมด</span>
            </div>
            <div className="bg-white rounded-2xl border overflow-hidden">
              <div className="divide-y divide-gray-100">
                {bookings.slice(0, 5).map(b => {
                  const notificationType = b.Status === 'pending' ? 'new_request' : 
                                         b.Status === 'approved' ? 'approved' : 
                                         b.Status === 'rejected' ? 'rejected' : 'cancelled';
                  const notificationConfig = {
                    new_request: { 
                      icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
                      bg: 'bg-blue-100',
                      text: 'text-blue-600',
                      label: 'คำขอใหม่'
                    },
                    approved: { 
                      icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
                      bg: 'bg-green-100',
                      text: 'text-green-600',
                      label: 'อนุมัติแล้ว'
                    },
                    rejected: { 
                      icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
                      bg: 'bg-red-100',
                      text: 'text-red-600',
                      label: 'ถูกปฏิเสธ'
                    },
                    cancelled: { 
                      icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
                      bg: 'bg-gray-100',
                      text: 'text-gray-600',
                      label: 'ยกเลิกแล้ว'
                    }
                  };
                  const config = notificationConfig[notificationType] || notificationConfig.new_request;
                  
                  return (
                    <div key={b.BookingID} className="p-4 flex items-center gap-4 hover:bg-gray-50">
                      <div className={`w-10 h-10 ${config.bg} rounded-xl flex items-center justify-center ${config.text}`}>
                        {config.icon}
                      </div>
                      <div className="flex-1">
                        <div className="text-sm text-gray-800">
                          <span className="font-medium">{b.UserName}</span> {config.label} สำหรับ {b.RoomName}
                        </div>
                        <div className="text-xs text-gray-500 mt-1">

    /* ─── Tab: Users ─── */
    function UsersTab() {
      const [users, setUsers]     = useState([]);
      const [form, setForm]       = useState({ name:'', email:'', role:'student', faculty:'', department:'' });
      const [error, setError]     = useState('');
      const [success, setSuccess] = useState('');
      const [loading, setLoading] = useState(true);
      const [creating, setCreating] = useState(false);

      useEffect(() => { loadUsers(); }, []);

      async function loadUsers() {
        try { setUsers(await apiFetch('/api/admin/users')); }
        catch (e) { alert(e.message); }
        finally { setLoading(false); }
      }

      async function createUser(e) {
        e.preventDefault(); setError(''); setSuccess('');
        
        // Validation
        if (!form.name.trim()) return setError('กรุณากรอกชื่อ-นามสกุล');
        if (!form.email.trim()) return setError('กรุณากรอกอีเมล');
        if (!form.email.includes('@')) return setError('รูปแบบอีเมลไม่ถูกต้อง');
        
        // Generate password from surname (last word of name)
        const nameParts = form.name.trim().split(' ');
        const surname = nameParts[nameParts.length - 1] || form.name.trim();
        const password = surname;
        
        if (!confirm(`ยืนยันการสร้างผู้ใช้ใหม่: ${form.name}?\nรหัสผ่านเริ่มต้น: ${password}`)) return;
        
        setCreating(true);
        
        // Optimistic update - add to UI immediately
        const tempUser = { 
          UserID: Date.now(), 
          Name: form.name, 
          Email: form.email, 
          Role: form.role, 
          Faculty: form.faculty, 
          Department: form.department,
          force_change_password: 1
        };
        setUsers(prev => [tempUser, ...prev]);
        
        const tempForm = { 
          Name: form.name,
          Email: form.email,
          Password: password,
          Role: form.role,
          Faculty: form.faculty,
          Department: form.department
        };
        setForm({ name:'', email:'', role:'student', faculty:'', department:'' });
        
        try {
          const result = await apiFetch('/api/admin/users', { method: 'POST', body: tempForm });
          console.log('User created:', result);
          setSuccess('สร้างผู้ใช้สำเร็จแล้ว');
          // Reload to get the correct data from server
          await loadUsers();
          setTimeout(() => setSuccess(''), 3000);
        } catch (err) {
          console.error('Error creating user:', err);
          setError(err.message || 'ไม่สามารถสร้างผู้ใช้ได้');
          // Rollback on error
          await loadUsers();
        } finally {
          setCreating(false);
        }
      }

      async function deleteUser(id) {
        if (!confirm('ลบผู้ใช้นี้?')) return;
        
        // Optimistic update - remove from UI immediately
        setUsers(prev => prev.filter(u => u.UserID !== id));
        
        try {
          await apiFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
        } catch (e) {
          console.error('Error deleting user:', e);
          alert('ไม่สามารถลบผู้ใช้ได้: ' + (e.message || 'Unknown error'));
          // Rollback on error
          await loadUsers();
        }
      }

      const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

      return (
        <div className="space-y-6">
          {/* ฟอร์มสร้างผู้ใช้ */}
          <div className="bg-white rounded-2xl border p-6">
            <h3 className="font-semibold text-gray-800 mb-4">เพิ่มผู้ใช้ใหม่</h3>
            {error && <div id="user-error" className="bg-red-50 text-red-700 text-sm rounded-lg px-4 py-3 mb-4 flex items-center gap-2" role="alert">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              {error}
            </div>}
            {success && <div className="bg-green-50 text-green-700 text-sm rounded-lg px-4 py-3 mb-4 flex items-center gap-2" role="alert">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              {success}
            </div>}
            <form onSubmit={createUser} className="grid grid-cols-1 md:grid-cols-2 gap-4" aria-describedby="user-error">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">ชื่อ-นามสกุล</label>
                <input value={form.name} onChange={e => f('name', e.target.value)} placeholder="ชื่อ-นามสกุล" required
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">อีเมล</label>
                <input value={form.email} onChange={e => f('email', e.target.value)} placeholder="อีเมล" type="email" required
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">สิทธิ์</label>
                <select value={form.role} onChange={e => f('role', e.target.value)}
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                  <option value="student">นักศึกษา</option>
                  <option value="teacher">อาจารย์</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">คณะ (ถ้ามี)</label>
                <input value={form.faculty} onChange={e => f('faculty', e.target.value)} placeholder="คณะ"
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
              </div>
              <div className="md:col-span-2">
                <button type="submit" disabled={creating}
                  className={`bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white text-sm font-medium px-6 py-2.5 rounded-xl transition`}
                  aria-label="เพิ่มผู้ใช้ใหม่">
                  {creating ? 'กำลังสร้าง...' : '+ เพิ่มผู้ใช้'}
                </button>
                <span className="text-xs text-gray-400 ml-3">รหัสผ่านเริ่มต้น = นามสกุล (ต้องเปลี่ยนเมื่อ Login ครั้งแรก)</span>
              </div>
            </form>
          </div>

          {/* ตารางผู้ใช้ */}
          <div className="bg-white rounded-2xl border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-50">
                  <tr>
                    {['ชื่อ', 'อีเมล', 'สิทธิ์', 'รหัสผ่าน', 'สถานะรหัสผ่าน', ''].map(h => (
                      <th key={h} className="text-left px-6 py-3 font-semibold text-gray-600">{h}</th>
                    ))}

                </thead>
                <tbody className="divide-y divide-gray-100">
                  {loading ? (
                    <tr><td colSpan="6" className="text-center py-8 text-gray-400">กำลังโหลด...</td></tr>

                        {u.force_change_password

                        <button onClick={() => deleteUser(u.UserID)}

      async function addHoliday(e) {
        e.preventDefault();
        if (!confirm(`ยืนยันการเพิ่มวันหยุด: ${date}?`)) return;
        
        // Optimistic update - add to UI immediately
        const tempHoliday = { HolidayID: Date.now(), HolidayDate: date, Description: desc };
        setHolidays(prev => [tempHoliday, ...prev]);
        const tempDate = date;
        const tempDesc = desc;
        setDate('');
        setDesc('');
        
        try {
          const result = await apiFetch('/api/admin/holidays', { method: 'POST', body: { HolidayDate: tempDate, Description: tempDesc } });
          console.log('Holiday added:', result);
          // Reload to get the correct data from server
          await loadHolidays();
        }
        catch (err) {
          console.error('Error adding holiday:', err);
          alert('ไม่สามารถเพิ่มวันหยุดได้: ' + (err.message || 'Unknown error'));
          // Rollback on error
          await loadHolidays();
        }
      }

      async function del(id) {
        if (!confirm('ลบวันหยุดนี้?')) return;
        
        // Optimistic update - remove from UI immediately
        setHolidays(prev => prev.filter(h => h.HolidayID !== id));
        
        try {
          await apiFetch(`/api/admin/holidays/${id}`, { method: 'DELETE' });
        }
        catch (e) {
          console.error('Error deleting holiday:', e);
          alert('ไม่สามารถลบวันหยุดได้: ' + (e.message || 'Unknown error'));
          // Rollback on error
          await loadHolidays();
        }
      }

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-2xl border p-6">
            <h3 className="font-semibold text-gray-800 mb-4">เพิ่มวันหยุดพิเศษ</h3>
            <form onSubmit={addHoliday} className="flex gap-4">
              <div className="flex-1">
                <input type="date" value={date} onChange={e => setDate(e.target.value)} required
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
              </div>
              <div className="flex-2">
                <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="คำอธิบาย (เช่น วันหยุดนักขัตฤกษ์)"
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
              </div>
              <button type="submit"
                className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-6 py-2.5 rounded-xl transition">
                + เพิ่ม
              </button>
            </form>
          </div>

          <div className="space-y-3">
            {holidays.length === 0
              ? <div className="text-center py-16 bg-white rounded-2xl border">
                  <div className="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg className="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                  </div>
                  <p className="text-gray-500">ยังไม่มีวันหยุดพิเศษ</p>
                </div>
              : holidays.map(h => (
                <div key={h.HolidayID} className="bg-white rounded-2xl border px-6 py-4 flex items-center justify-between card-hover transition-all duration-200">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
                      <svg className="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    </div>
                    <div>
                      <span className="font-medium text-gray-800">
                        {new Date(h.HolidayDate).toLocaleDateString('th-TH', { dateStyle: 'long' })}
                      </span>
                      {h.Description && <span className="text-sm text-gray-500 ml-2">— {h.Description}</span>}
                    </div>
                  </div>
                  <button onClick={() => del(h.HolidayID)}
                    className="text-sm text-red-600 hover:text-red-700 font-medium transition">ลบ</button>
                </div>
              ))
            }
          </div>
        </div>
      );
    }

    /* ─── Tab: Password Requests ─── */
    function PasswordRequestsTab() {
      const [requests, setRequests] = useState([]);
      const [filter, setFilter] = useState('all');

      useEffect(() => { loadRequests(); }, []);

      async function loadRequests() {
        try { setRequests(await apiFetch('/api/admin/password-requests')); }
        catch (e) { alert(e.message); }
      }

      async function handleAction(id, action, notes) {
        if (!confirm(`ยืนยันการ${action === 'approved' ? 'อนุมัติ' : 'ปฏิเสธ'}คำขอนี้?`)) return;
        try {
          if (action === 'approved') {
            await apiFetch(`/api/admin/password-requests/${id}/approve`, {
              method: 'PATCH',
              body: {}
            });
          } else {
            await apiFetch(`/api/admin/password-requests/${id}/reject`, {
              method: 'PATCH',
              body: { Notes: notes }
            });
          }
          loadRequests();
        } catch (e) { alert(e.message); }
      }

      const filtered = filter === 'all' ? requests : requests.filter(r => r.Status === filter);
      const STATUS = {
        pending: { label: 'รอดำเนินการ', color: 'bg-yellow-100 text-yellow-800 border-yellow-200' },
        approved: { label: 'อนุมัติแล้ว', color: 'bg-green-100 text-green-800 border-green-200' },
        rejected: { label: 'ปฏิเสธ', color: 'bg-red-100 text-red-800 border-red-200' },
      };

      return (
        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <h2 className="text-xl font-bold text-gray-800">คำขอลืมรหัสผ่าน</h2>
            <div className="flex gap-2">
              {['all','pending','approved','rejected'].map(f => (
                <button key={f} onClick={() => setFilter(f)}
                  className={`text-sm px-4 py-2 rounded-xl border transition font-medium
                    ${filter === f ? 'nav-active border-transparent' : 'bg-white text-gray-600 border-gray-300 hover:border-blue-400'}`}
                  aria-label={`กรองสถานะ${f === 'all' ? 'ทั้งหมด' : STATUS[f]?.label}`}>
                  {f === 'all' ? 'ทั้งหมด' : STATUS[f]?.label}
                </button>
              ))}
            </div>
          </div>

          {filtered.length === 0 ? (
            <div className="text-center py-16 bg-white rounded-2xl border">
              <div className="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
              </div>
              <p className="text-gray-500">ไม่มีคำขอลืมรหัสผ่าน</p>
            </div>
          ) : (
            <div className="space-y-3">
              {filtered.map(r => (
                <div key={r.RequestID} className="bg-white rounded-2xl border px-6 py-4 card-hover transition-all duration-200">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div className="flex-1">
                      <div className="flex items-center gap-3 mb-2">
                        <span className={`text-xs font-medium px-3 py-1 rounded-full border ${STATUS[r.Status]?.color}`}>
                          {STATUS[r.Status]?.label}
                        </span>
                        <span className="text-sm text-gray-500">
                          {new Date(r.RequestDate).toLocaleString('th-TH')}
                        </span>
                      </div>
                      <div className="font-semibold text-gray-800">{r.UserName}</div>
                      <div className="text-sm text-gray-600">{r.Email}</div>
                      {r.UserPassword && (
                        <div className="text-sm text-gray-500 mt-1">
                          <span className="font-medium">รหัสผ่านปัจจุบัน:</span> {r.UserPassword}
                        </div>
                      )}
                      {r.Notes && (
                        <div className="text-sm text-gray-500 mt-1">
                          <span className="font-medium">หมายเหตุ:</span> {r.Notes}
                        </div>
                      )}
                      {r.ProcessedDate && (
                        <div className="text-xs text-gray-400 mt-1">
                          ดำเนินการเมื่อ {new Date(r.ProcessedDate).toLocaleString('th-TH')}
                          {r.AdminName && ` โดย ${r.AdminName}`}
                        </div>
                      )}
                    </div>
                    {r.Status === 'pending' && (
                      <div className="flex gap-2">
                        <button
                          onClick={() => handleAction(r.RequestID, 'approved')}
                          className="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-xl transition"
                          aria-label="อนุมัติคำขอลืมรหัสผ่าน">
                          อนุมัติ
                        </button>
                        <button
                          onClick={() => {
                            const notes = prompt('เหตุผลในการปฏิเสธ (ถ้ามี):');
                            if (notes !== null) handleAction(r.RequestID, 'rejected', notes);
                          }}
                          className="bg-red-500 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-xl transition"
                          aria-label="ปฏิเสธคำขอลืมรหัสผ่าน">
                          ปฏิเสธ
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ─── Main ─── */
    function AdminDashboard() {
      const [user, setUser] = useState(null);
      const [tab, setTab]   = useState('bookings');

      useEffect(() => {
        requireLogin(['admin']).then(u => { if (u) setUser(u); });
      }, []);

      if (!user) return <div className="text-center mt-20 text-gray-400">กำลังโหลด...</div>;

      return (
        <div>
          <header role="banner">
            <AdminNav user={user} tab={tab} setTab={setTab} />
          </header>
          <main id="main-content" role="main" className="max-w-7xl mx-auto px-4 py-8">
            {tab === 'bookings' && <BookingsTab />}
            {tab === 'rooms'    && <RoomsTab />}
            {tab === 'users'    && <UsersTab />}
            {tab === 'holidays' && <HolidaysTab />}
            {tab === 'password-requests' && <PasswordRequestsTab />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AdminDashboard />);
  </script>
</body>
</html>
