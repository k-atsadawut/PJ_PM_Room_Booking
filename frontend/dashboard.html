<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ระบบจองห้อง</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/theme.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .status-available { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); }
    .status-booked { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); }
    .status-maintenance { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ConfirmModal({ open, title, description, confirmText = 'ยืนยัน', cancelText = 'ยกเลิก', loading = false, onConfirm, onCancel }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full border border-slate-200 overflow-hidden">
            <div className="p-6">
              <div className="flex items-start justify-between gap-4">
                <div>
                  <h3 className="text-lg font-semibold text-gray-900">{title}</h3>
                  <p className="mt-3 text-sm leading-6 text-gray-600">{description}</p>
                </div>
                <button type="button" onClick={onCancel} className="text-gray-400 hover:text-gray-600 transition" aria-label="ปิด">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
              <div className="mt-6 flex justify-end gap-3">
                <button type="button" onClick={onCancel} className="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 transition">
                  {cancelText}
                </button>
                <button type="button" onClick={onConfirm} disabled={loading} className={`rounded-xl px-4 py-2 text-sm font-medium text-white transition ${loading ? 'bg-slate-300' : 'bg-blue-600 hover:bg-blue-700'}`}>
                  {loading ? 'กำลังดำเนินการ...' : confirmText}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const STATUS_LABEL = {
      pending:   { label: 'รออนุมัติ',  color: 'bg-yellow-100 text-yellow-800 border-yellow-200' },
      approved:  { label: 'อนุมัติแล้ว', color: 'bg-green-100 text-green-800 border-green-200' },
      rejected:  { label: 'ถูกปฏิเสธ',  color: 'bg-red-100 text-red-800 border-red-200' },
      cancelled: { label: 'ยกเลิกแล้ว', color: 'bg-gray-100 text-gray-600 border-gray-200' },
    };

    function Navbar({ user }) {
      const [currentTime, setCurrentTime] = useState(new Date());
      const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
      
      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        
        const handleThemeChange = (e) => {
          setIsDark(document.documentElement.classList.contains('dark'));
        };
        window.addEventListener('themeChanged', handleThemeChange);
        
        return () => {
          clearInterval(timer);
          window.removeEventListener('themeChanged', handleThemeChange);
        };
      }, []);

      return (
        <nav className="bg-white shadow-sm px-6 py-4">
          <div className="max-w-7xl mx-auto flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
              </div>
              <div className="hidden sm:block">
                <span className="font-bold text-gray-800">ระบบจองห้องผลิตสื่อดิจิทัล</span>
                <p className="text-xs text-gray-500">มหาวิทยาลัยนอร์ทกรุงเทพ</p>
              </div>
              <div className="block sm:hidden">
                <span className="font-bold text-gray-800 text-sm">จองห้องผลิตสื่อ</span>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-right hidden sm:block">
                <div className="text-sm font-semibold text-gray-800">{currentTime.toLocaleTimeString('th-TH')}</div>
                <div className="text-xs text-gray-500">{currentTime.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>
              </div>
              <div className="h-8 w-px bg-gray-200 hidden sm:block"></div>
              <div className="flex items-center gap-3">
                <div className="text-right hidden md:block">
                  <div className="text-sm font-medium text-gray-800">{user?.name}</div>
                  <div className="text-xs text-gray-500">{user?.role === 'teacher' ? 'อาจารย์' : 'นักศึกษา'}</div>
                </div>
                <a href="/booking.html"
                  className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-xl transition flex items-center gap-2">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                  </svg>
                  จองห้อง
                </a>
                <button 
                  onClick={() => window.toggleTheme()} 
                  className="text-gray-500 hover:text-blue-600 transition p-2 rounded-lg hover:bg-gray-100"
                  aria-label="เปลี่ยนธีม"
                >
                  {isDark ? (
                    <svg className="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                    </svg>
                  ) : (
                    <svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                  )}
                </button>
                <button onClick={logout} className="text-gray-500 hover:text-red-500 transition p-2" aria-label="ออกจากระบบ">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </nav>
      );
    }

    function StatCard({ icon, label, value, color }) {
      return (
        <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
          <div className="flex items-center justify-between">
            <div>
              <p className="text-sm text-gray-500 mb-1">{label}</p>
              <p className="text-2xl font-bold text-gray-800">{value}</p>
            </div>
            <div className={`w-12 h-12 rounded-xl ${color} flex items-center justify-center`}>
              {icon}
            </div>
          </div>
        </div>
      );
    }

    function RoomStatusCard({ room, onBook }) {
      const statusConfig = {
        available: { 
          label: 'ว่าง', 
          bg: 'status-available', 
          text: 'text-green-800',
          icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
        },
        booked: { 
          label: 'ไม่ว่าง', 
          bg: 'status-booked', 
          text: 'text-red-800',
          icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        },
        maintenance: { 
          label: 'ปิดปรับปรุง', 
          bg: 'status-maintenance', 
          text: 'text-yellow-800',
          icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        }
      };
      
      const config = statusConfig[room.Status] || statusConfig.available;

      return (
        <div className="bg-white rounded-2xl border p-5 card-hover transition-all duration-200">
          <div className="flex items-start justify-between mb-4">
            <div>
              <h3 className="font-semibold text-gray-800">{room.RoomName}</h3>
              <p className="text-sm text-gray-500 mt-1">ความจุ {room.Capacity} คน</p>
            </div>
            <div className={`px-3 py-1 rounded-full text-xs font-medium ${config.bg} ${config.text} border border-current/20`}>
              {config.label}
            </div>
          </div>
          
          {room.Status === 'booked' && room.current_booking && (
            <div className="bg-red-50 rounded-xl p-3 mb-3">
              <div className="flex items-center gap-2 text-sm text-red-700">
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span className="font-medium">{room.current_booking.user}</span>
              </div>
              <p className="text-xs text-red-600 mt-1">จนถึง {room.current_booking.end}</p>
            </div>
          )}
          
          {room.Status === 'maintenance' && (
            <div className="bg-yellow-50 rounded-xl p-3 mb-3">
              <p className="text-xs text-yellow-700">{room.maintenance_reason || 'รอการซ่อมบำรุง'}</p>
            </div>
          )}
          
          {room.bookings_today?.length > 0 && (
            <div className="space-y-2 mb-3">
              {room.bookings_today.map((bk, i) => (
                <div key={i} className="flex items-center justify-between text-xs bg-gray-50 rounded-lg px-3 py-2">
                  <span className="text-gray-600">{bk.start} - {bk.end}</span>
                  <span className={`px-2 py-0.5 rounded-full ${STATUS_LABEL[bk.status]?.color}`}>
                    {STATUS_LABEL[bk.status]?.label}
                  </span>
                </div>
              ))}
            </div>
          )}
          
          {room.Status === 'available' && (
            <button 
              onClick={() => onBook(room)}
              className="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-xl transition"
            >
              จองห้องนี้
            </button>
          )}
        </div>
      );
    }

    function Dashboard() {
      const [user, setUser]         = useState(null);
      const [bookings, setBookings] = useState([]);
      const [rooms, setRooms]       = useState([]);
      const [loading, setLoading]   = useState(true);
      const [holidays, setHolidays] = useState([]);
      const [showHolidayPopup, setShowHolidayPopup] = useState(false);
      const [upcomingHolidays, setUpcomingHolidays] = useState([]);
      const [showUpcomingHolidaysPopup, setShowUpcomingHolidaysPopup] = useState(false);
      const [globalError, setGlobalError] = useState('');
      const [confirmState, setConfirmState] = useState({
        open: false,
        title: '',
        description: '',
        confirmText: 'ยืนยัน',
        cancelText: 'ยกเลิก',
        loading: false,
        onConfirm: null,
      });

      useEffect(() => {
        requireLogin(['student', 'teacher']).then(u => {
          if (!u) return;
          setUser(u);
          loadHolidays().then((isTodayHoliday) => {
            if (!isTodayHoliday) {
              loadData();
              loadUpcomingHolidays();
            }
          });
        });
      }, []);

      async function loadData() {
        try {
          const [bookingsData, roomsData] = await Promise.all([
            apiFetch('/api/bookings'),
            apiFetch('/api/rooms')
          ]);
          setBookings(bookingsData);
          setRooms(roomsData);
        } catch (e) {
          setGlobalError('ไม่สามารถโหลดข้อมูลได้: ' + (e.message || 'Unknown error'));
        } finally {
          setLoading(false);
        }
      }

      async function loadHolidays() {
        try {
          const holidayData = await apiFetch('/api/holidays/today');
          if (holidayData) {
            setHolidays([holidayData]);
            setShowHolidayPopup(true);
            // Block access on holiday
            setLoading(false);
            return true;
          }
        } catch (e) {
          console.error(e);
        }
        return false;
      }

      async function loadUpcomingHolidays() {
        if (sessionStorage.getItem('showHolidayPopup') !== 'true') return;
        try {
          const data = await apiFetch('/api/holidays');
          if (data && data.length > 0) {
            setUpcomingHolidays(data);
            setShowUpcomingHolidaysPopup(true);
          }
        } catch (e) {
          console.error(e);
        }
      }

      function openConfirm({ title, description, confirmText = 'ยืนยัน', cancelText = 'ยกเลิก', onConfirm }) {
        setConfirmState({ open: true, title, description, confirmText, cancelText, loading: false, onConfirm });
      }

      function closeConfirm() {
        setConfirmState(prev => ({ ...prev, open: false, loading: false, onConfirm: null }));
      }

      async function handleConfirm() {
        if (!confirmState.onConfirm) {
          closeConfirm();
          return;
        }
        setConfirmState(prev => ({ ...prev, loading: true }));
        try {
          await confirmState.onConfirm();
        } finally {
          closeConfirm();
        }
      }

      function cancelBooking(id) {
        openConfirm({
          title: 'ยืนยันการยกเลิกการจอง',
          description: 'คุณแน่ใจหรือไม่ว่าต้องการยกเลิกการจองนี้? ข้อมูลการจองจะถูกเปลี่ยนเป็นสถานะยกเลิก',
          confirmText: 'ยืนยันการยกเลิก',
          cancelText: 'ยกเลิก',
          onConfirm: async () => {
            try {
              await apiFetch(`/api/bookings/${id}/cancel`, { method: 'PATCH' });
              await loadData();
            } catch (e) {
              setGlobalError('ไม่สามารถยกเลิกการจองได้: ' + (e.message || 'Unknown error'));
            }
          }
        });
      }

      function handleBookRoom(room) {
        window.location.href = `/booking.html?roomId=${room.RoomID}`;
      }

      if (!user) return <div className="text-center mt-20 text-gray-400">กำลังโหลด...</div>;

      const stats = {
        todayBookings: bookings.filter(b => b.Status === 'approved' && new Date(b.BookingDate).toDateString() === new Date().toDateString()).length,
        pending: bookings.filter(b => b.Status === 'pending').length,
        approved: bookings.filter(b => b.Status === 'approved').length,
      };

      return (
        <div>
          <header role="banner">
            <Navbar user={user} />
          </header>

          {globalError && (
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4">
              <div className="bg-red-50 border border-red-200 text-red-700 rounded-2xl px-4 py-3 mb-4 flex items-start justify-between gap-4" role="alert">
                <div>
                  <p className="text-sm font-semibold">เกิดข้อผิดพลาด</p>
                  <p className="mt-1 text-sm">{globalError}</p>
                </div>
                <button onClick={() => setGlobalError('')} className="text-red-500 hover:text-red-700 transition" aria-label="ปิดข้อความข้อผิดพลาด">×</button>
              </div>
            </div>
          )}

          {/* Holiday Popup */}
          {showHolidayPopup && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center">
                    <svg className="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                  </div>
                  <div>
                    <h3 className="text-lg font-bold text-gray-800">วันนี้เป็นวันหยุด</h3>
                    <p className="text-sm text-gray-500">ระบบไม่เปิดให้ใช้งาน</p>
                  </div>
                </div>
                <div className="space-y-3 mb-6">
                  {holidays.map(h => (
                    <div key={h.HolidayID} className="flex items-center gap-3 p-3 bg-red-50 rounded-xl">
                      <div className="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center flex-shrink-0">
                        <svg className="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                      </div>
                      <div className="flex-1">
                        <div className="font-medium text-gray-800">
                          {new Date(h.HolidayDate).toLocaleDateString('th-TH', { dateStyle: 'long' })}
                        </div>
                        {h.Description && (
                          <div className="text-sm text-gray-500">{h.Description}</div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
                <button
                  onClick={() => {
                    window.location.href = '/login.html';
                  }}
                  className="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 rounded-xl transition"
                  aria-label="ออกจากระบบ"
                >
                  ออกจากระบบ
                </button>
              </div>
            </div>
          )}

          {/* Upcoming Holidays Popup */}
          {showUpcomingHolidaysPopup && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-[28px] max-w-md w-full p-8 shadow-2xl border border-gray-100 flex flex-col items-center">
                
                {/* Centered Icon Header */}
                <div className="w-16 h-16 bg-[#e0e7ff] rounded-2xl flex items-center justify-center mb-4">
                  <svg className="w-8 h-8 text-[#4f46e5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z M3 3l18 18" />
                  </svg>
                </div>

                <h3 className="text-xl font-bold text-gray-900 text-center mb-1">ประกาศวันหยุดทำการ</h3>
                <p className="text-sm text-gray-500 text-center mb-6">โปรดวางแผนการใช้งานหรือจองห้องล่วงหน้า</p>

                {/* Holiday List Items */}
                <div className="space-y-3 mb-6 max-h-60 overflow-y-auto pr-1 w-full">
                  {upcomingHolidays.map(h => (
                    <div key={h.HolidayID} className="flex items-center gap-4 p-4 bg-[#f8faff] rounded-[18px] border border-[#e0e7ff]">
                      <div className="w-5 h-5 flex items-center justify-center flex-shrink-0 text-[#4f46e5]">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                      </div>
                      <div className="flex-1">
                        <div className="font-bold text-gray-800 text-sm">
                          {new Date(h.HolidayDate).toLocaleDateString('th-TH', { dateStyle: 'long' })}
                        </div>
                        {h.Description && (
                          <div className="text-xs text-gray-500 mt-1">{h.Description}</div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>

                <button
                  onClick={() => {
                    sessionStorage.removeItem('showHolidayPopup');
                    setShowUpcomingHolidaysPopup(false);
                  }}
                  className="w-full bg-[#4f46e5] hover:bg-[#4338ca] text-white font-medium py-3 px-6 rounded-2xl transition-all duration-200 active:scale-[0.98] shadow-md hover:shadow-lg"
                  aria-label="รับทราบ"
                >
                  รับทราบ
                </button>
              </div>
            </div>
          )}


          <main id="main-content" role="main" className="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
            {/* Welcome Section */}
            <div className="mb-6 sm:mb-8">
              <h1 className="text-xl sm:text-2xl font-bold text-gray-800">
                สวัสดี, {user.name} 👋
              </h1>
              <p className="text-gray-500 mt-1 text-sm sm:text-base">จองห้องและติดตามสถานะการจองของคุณ</p>
            </div>

            {/* Stats Cards */}
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6 sm:mb-8">
              <StatCard
                icon={<svg className="w-5 h-5 sm:w-6 sm:h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>}
                label="จองวันนี้"
                value={stats.todayBookings}
                color="bg-blue-100"
              />
              <StatCard
                icon={<svg className="w-5 h-5 sm:w-6 sm:h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>}
                label="รออนุมัติ"
                value={stats.pending}
                color="bg-yellow-100"
              />
              <StatCard
                icon={<svg className="w-5 h-5 sm:w-6 sm:h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>}
                label="อนุมัติแล้ว"
                value={stats.approved}
                color="bg-green-100"
              />
              <StatCard
                icon={<svg className="w-5 h-5 sm:w-6 sm:h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>}
                label="แจ้งเตือน"
                value="0"
                color="bg-purple-100"
              />
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
              {/* Room Status */}
              <div className="lg:col-span-2">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-base sm:text-lg font-bold text-gray-800">สถานะห้องแบบเรียลไทม์</h2>
                  <a href="/booking.html" className="text-sm text-blue-600 hover:text-blue-700 font-medium">
                    ดูทั้งหมด →
                  </a>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                  {rooms.slice(0, 4).map(room => (
                    <RoomStatusCard key={room.RoomID} room={room} onBook={handleBookRoom} />
                  ))}
                </div>
              </div>

              {/* Quick Book */}
              <div>
                <h2 className="text-base sm:text-lg font-bold text-gray-800 mb-4">จองห้องด่วน</h2>
                <div className="bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl p-4 sm:p-6 text-white">
                  <div className="flex items-center gap-3 mb-4">
                    <div className="w-10 h-10 sm:w-12 sm:h-12 bg-white/20 rounded-xl flex items-center justify-center">
                      <svg className="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                    </div>
                    <div>
                      <h3 className="font-semibold text-sm sm:text-base">จองห้องทันที</h3>
                      <p className="text-xs sm:text-sm text-blue-100">เลือกห้องและเวลาที่ต้องการ</p>
                    </div>
                  </div>
                  <a href="/booking.html" className="block w-full bg-white text-blue-600 text-center font-semibold py-2 sm:py-3 rounded-xl hover:bg-blue-50 transition text-sm sm:text-base">
                    เริ่มจองห้อง
                  </a>
                </div>
              </div>
            </div>

            {/* My Bookings */}
            <div className="mt-6 sm:mt-8">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-base sm:text-lg font-bold text-gray-800">การจองของฉัน</h2>
                <a href="/booking.html" className="text-sm text-blue-600 hover:text-blue-700 font-medium">
                  จองห้องใหม่ →
                </a>
              </div>

              {loading ? (
                <div className="text-center text-gray-400 py-12">กำลังโหลด...</div>
              ) : bookings.length === 0 ? (
                <div className="text-center py-12 sm:py-16 bg-white rounded-2xl border">
                  <div className="w-12 h-12 sm:w-16 sm:h-16 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg className="w-6 h-6 sm:w-8 sm:h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                  </div>
                  <p className="text-gray-500 mb-2 text-sm sm:text-base">ยังไม่มีประวัติการจอง</p>
                  <a href="/booking.html" className="inline-block text-blue-600 hover:text-blue-700 text-sm font-medium">
                    จองห้องตอนนี้ →
                  </a>
                </div>
              ) : (
                <div className="bg-white rounded-2xl border overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full">
                      <thead className="bg-gray-50">
                        <tr>
                          <th className="text-left px-4 sm:px-6 py-3 text-xs sm:text-sm font-semibold text-gray-600">ห้อง</th>
                          <th className="text-left px-4 sm:px-6 py-3 text-xs sm:text-sm font-semibold text-gray-600 hidden sm:table-cell">วันที่</th>
                          <th className="text-left px-4 sm:px-6 py-3 text-xs sm:text-sm font-semibold text-gray-600">เวลา</th>
                          <th className="text-left px-4 sm:px-6 py-3 text-xs sm:text-sm font-semibold text-gray-600">สถานะ</th>
                          <th className="text-right px-4 sm:px-6 py-3 text-xs sm:text-sm font-semibold text-gray-600">จัดการ</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {bookings.map(b => {
                          const s = STATUS_LABEL[b.Status] || {};
                          const canCancel = ['pending', 'approved'].includes(b.Status);
                          return (
                            <tr key={b.BookingID} className="hover:bg-gray-50">
                              <td className="px-4 sm:px-6 py-3 sm:py-4">
                                <div className="font-medium text-gray-800 text-sm sm:text-base">{b.RoomName}</div>
                              </td>
                              <td className="px-4 sm:px-6 py-3 sm:py-4 text-xs sm:text-sm text-gray-500 hidden sm:table-cell">
                                {new Date(b.BookingDate).toLocaleDateString('th-TH', { dateStyle: 'medium' })}
                              </td>
                              <td className="px-4 sm:px-6 py-3 sm:py-4 text-xs sm:text-sm text-gray-600">
                                {b.StartTime}–{b.EndTime}
                              </td>
                              <td className="px-4 sm:px-6 py-3 sm:py-4">
                                <span className={`text-xs font-medium px-2 sm:px-3 py-1 rounded-full border ${s.color}`}>
                                  {s.label}
                                </span>
                              </td>
                              <td className="px-4 sm:px-6 py-3 sm:py-4 text-right">
                                {canCancel && (
                                  <button onClick={() => cancelBooking(b.BookingID)}
                                    className="text-xs sm:text-sm text-red-600 hover:text-red-700 font-medium transition">
                                    ยกเลิก
                                  </button>
                                )}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          </main>

          <ConfirmModal
            open={confirmState.open}
            title={confirmState.title}
            description={confirmState.description}
            confirmText={confirmState.confirmText}
            cancelText={confirmState.cancelText}
            loading={confirmState.loading}
            onConfirm={handleConfirm}
            onCancel={closeConfirm}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
