<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลืมรหัสผ่าน - ระบบจองห้องผลิตสื่อ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json',
          ...options.headers,
        },
      });
      if (!res.ok) throw await res.json();
      return res.json();
    }

    function ForgotPasswordPage() {
      const [email, setEmail] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      async function handleSubmit(e) {
        e.preventDefault();
        setLoading(true);
        setError('');
        setSuccess('');

        try {
          const data = await apiFetch('/api/forgot-password', {
            method: 'POST',
            body: JSON.stringify({ email }),
          });
          setSuccess(data.message);
          setEmail('');
        } catch (err) {
          setError(err.error || 'เกิดข้อผิดพลาด');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen flex items-center justify-center px-4 py-12">
          <div className="max-w-md w-full">
            <div className="text-center mb-8">
              <div className="text-4xl mb-2">🔐</div>
              <h1 className="text-2xl font-bold text-gray-800">ลืมรหัสผ่าน</h1>
              <p className="text-sm text-gray-500 mt-2">
                กรอกอีเมลของคุณเพื่อส่งคำขอลืมรหัสผ่านไปยัง admin
              </p>
            </div>

            <div className="bg-white rounded-xl shadow-sm border p-6">
              {error && (
                <div id="forgot-error" className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-4" role="alert">
                  {error}
                </div>
              )}
              {success && (
                <div className="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm mb-4">
                  ✅ {success}
                </div>
              )}

              <form onSubmit={handleSubmit} className="space-y-4" aria-describedby="forgot-error">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    placeholder="your.email@university.ac.th"
                    required
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"
                  />
                </div>

                <button
                  type="submit"
                  disabled={loading}
                  className="w-full bg-primary-600 hover:bg-primary-700 disabled:bg-primary-300 text-white font-semibold py-2 rounded-lg transition"
                  aria-label="ส่งคำขอลืมรหัสผ่าน"
                >
                  {loading ? 'กำลังส่ง...' : 'ส่งคำขอ'}
                </button>
              </form>

              <div className="mt-6 text-center">
                <a href="/login.html" className="text-sm text-primary-600 hover:text-primary-700 transition" aria-label="กลับไปหน้าเข้าสู่ระบบ">
                  ← กลับหน้าเข้าสู่ระบบ
                </a>
              </div>
            </div>

            <div className="mt-6 text-center text-xs text-gray-400">
              <p>คำขอจะถูกส่งไปยัง admin เพื่ออนุมัติ</p>
              <p>เมื่อได้รับการอนุมัติ คุณจะสามารถเข้าสู่ระบบเพื่อเปลี่ยนรหัสผ่านได้</p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ForgotPasswordPage />);
  </script>
</body>
</html>
