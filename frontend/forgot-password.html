<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลืมรหัสผ่าน - ระบบจองห้องผลิตสื่อ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ForgotPasswordPage() {
      // state machine: email → sent → reset → done
      const [step, setStep]       = useState('email');
      const [email, setEmail]     = useState('');
      const [resetToken, setResetToken] = useState('');
      const [newPass, setNewPass] = useState('');
      const [confirm, setConfirm] = useState('');
      const [error, setError]     = useState('');
      const [info, setInfo]       = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('resetToken');
        if (token) {
          setResetToken(token);
          setStep('reset');
        }
      }, []);

      async function sendEmailStep(e) {
        e.preventDefault();
        setError('');
        if (!email.trim() || !email.includes('@')) return setError('รูปแบบอีเมลไม่ถูกต้อง');
        setLoading(true);
        try {
          await apiFetch('/api/forgot-password', { method: 'POST', body: { email } });
          setInfo('ระบบส่งลิงก์รีเซ็ตรหัสผ่านไปยังอีเมลของคุณแล้ว (ถ้าอีเมลมีในระบบ)');
          setStep('sent');
        } catch (err) {
          setError(err.message || 'ส่งคำขอรีเซ็ตรหัสผ่านไม่สำเร็จ');
        } finally {
          setLoading(false);
        }
      }

      async function resetStep(e) {
        e.preventDefault();
        setError('');
        if (!resetToken) return setError('ลิงก์รีเซ็ตไม่ถูกต้อง');
        if (newPass.length < 6) return setError('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
        if (newPass !== confirm) return setError('รหัสผ่านและยืนยันไม่ตรงกัน');
        setLoading(true);
        try {
          await apiFetch('/api/forgot-password/reset', {
            method: 'POST',
            body: { resetToken, newPassword: newPass },
          });
          setStep('done');
        } catch (err) {
          setError(err.message || 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
        } finally {
          setLoading(false);
        }
      }

      function closeModal() {
        location.href = '/login.html';
      }

      return (
        <main id="main-content" role="main">
          {/* Backdrop + popup กลางจอ */}
          <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 relative">
              {/* ปุ่ม X ปิด */}
              <button
                onClick={closeModal}
                className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition"
                aria-label="ปิด">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>

              {/* Header แต่ละ step */}
              <div className="text-center mb-6">
                <div className="text-4xl mb-2">
                  {step === 'email' ? '📧' : step === 'sent' ? '✉️' : step === 'reset' ? '🔒' : '✅'}
                </div>
                <h1 className="text-xl font-bold text-gray-800">
                  {step === 'email' ? 'ลืมรหัสผ่าน' :
                   step === 'sent' ? 'ส่งลิงก์เรียบร้อย' :
                   step === 'reset' ? 'ตั้งรหัสผ่านใหม่' : 'เปลี่ยนรหัสผ่านสำเร็จ'}
                </h1>
              </div>

              {error && (
                <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-4" role="alert">{error}</div>
              )}
              {info && (
                <div className="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm mb-4" role="status">{info}</div>
              )}

              {/* STEP: email */}
              {step === 'email' && (
                <form onSubmit={sendEmailStep} className="space-y-4">
                  <p className="text-sm text-gray-500 text-center">กรอกอีเมลของคุณ เพื่อรับลิงก์รีเซ็ตรหัสผ่าน</p>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" required
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
                  </div>
                  <button type="submit" disabled={loading}
                    className="w-full bg-primary-600 hover:bg-primary-700 disabled:bg-primary-300 text-white font-semibold py-2 rounded-lg transition">
                    {loading ? 'กำลังส่ง...' : 'ส่งลิงก์รีเซ็ตรหัสผ่าน'}
                  </button>
                </form>
              )}

              {step === 'sent' && (
                <div className="space-y-4 text-center">
                  <p className="text-sm text-gray-600">ตรวจสอบกล่องจดหมายของคุณ แล้วคลิกลิงก์เพื่อรีเซ็ตรหัสผ่าน</p>
                  <button onClick={closeModal}
                    className="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2 rounded-lg transition">
                    กลับหน้าเข้าสู่ระบบ
                  </button>
                </div>
              )}

              {step === 'reset' && (
                <form onSubmit={resetStep} className="space-y-4">
                  <p className="text-sm text-gray-500 text-center">ตั้งรหัสผ่านใหม่สำหรับบัญชีของคุณ</p>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)</label>
                    <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} required minLength={6}
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">ยืนยันรหัสผ่านใหม่</label>
                    <input type="password" value={confirm} onChange={e => setConfirm(e.target.value)} required
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
                  </div>
                  <button type="submit" disabled={loading}
                    className="w-full bg-primary-600 hover:bg-primary-700 disabled:bg-primary-300 text-white font-semibold py-2 rounded-lg transition">
                    {loading ? 'กำลังบันทึก...' : 'บันทึกรหัสผ่านใหม่'}
                  </button>
                </form>
              )}

              {step === 'done' && (
                <div className="space-y-4 text-center">
                  <p className="text-sm text-gray-600">คุณสามารถเข้าสู่ระบบด้วยรหัสผ่านใหม่ได้ทันที</p>
                  <button onClick={closeModal}
                    className="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2 rounded-lg transition">
                    กลับหน้าเข้าสู่ระบบ
                  </button>
                </div>
              )}
            </div>
          </div>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ForgotPasswordPage />);
  </script>
</body>
</html>
