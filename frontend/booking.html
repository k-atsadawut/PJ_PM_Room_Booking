<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จองห้อง — ระบบจองห้องผลิตสื่อดิจิทัล</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/theme.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 min-h-screen transition-colors">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = {
      Camera:   (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
      Calendar: (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      Clock:    (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Building: (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>,
      Users:    (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 100-8 4 4 0 000 8z" /></svg>,
      Alert:    (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Check:    (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Chevron:  (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
      Sun:      (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" /></svg>,
      Moon:     (p) => <svg {...p} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
    };

    // Generate time slots (30-minute intervals from 08:30 to 17:00)
    const TIME_SLOTS = [];
    for (let hour = 8; hour <= 17; hour++) {
      for (let min = 0; min < 60; min += 30) {
        const timeStr = `${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
        if (timeStr >= '08:30' && timeStr <= '17:00') TIME_SLOTS.push(timeStr);
      }
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      return String(timeStr).substring(0, 5);
    }

    function BookingPage() {
      const [user, setUser]         = useState(null);
      const [rooms, setRooms]       = useState([]);
      const [selected, setSelected] = useState(null);
      const [date, setDate]         = useState('');
      const [start, setStart]       = useState('09:00');
      const [end, setEnd]           = useState('11:00');
      const [error, setError]       = useState('');
      const [success, setSuccess]   = useState('');
      const [loading, setLoading]   = useState(false);
      const [isDark, setIsDark]     = useState(document.documentElement.classList.contains('dark'));

      const today = new Date().toISOString().split('T')[0];

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('roomId');
        setDate(today);
        loadRooms();
        if (roomId) setSelected(parseInt(roomId));

        const u = requireLogin(['student', 'teacher']);
        u.then(setUser);

        const handleThemeChange = () => setIsDark(document.documentElement.classList.contains('dark'));
        window.addEventListener('themeChanged', handleThemeChange);
        return () => window.removeEventListener('themeChanged', handleThemeChange);
      }, []);

      async function loadRooms() {
        try { setRooms(await apiFetch('/api/rooms')); } catch {}
      }

      async function handleBook(e) {
        e.preventDefault();
        setError(''); setSuccess('');
        if (!selected) { setError('กรุณาเลือกห้อง'); return; }
        if (!date) { setError('กรุณาเลือกวันที่'); return; }
        if (!start || !end) { setError('กรุณาเลือกเวลาเริ่มต้นและสิ้นสุด'); return; }
        if (start >= end) { setError('เวลาสิ้นสุดต้องหลังจากเวลาเริ่มต้น'); return; }
        setLoading(true);
        try {
          await apiFetch('/api/bookings', {
            method: 'POST',
            body: { roomId: selected, date, start, end },
          });
          setSuccess(`จองห้องสำเร็จ! การจองของคุณได้รับการอนุมัติอัตโนมัติแล้ว (วันที่ ${date} เวลา ${start}–${end} น.)`);
          setSelected(null);
          loadRooms();
          setTimeout(() => window.location.href = '/dashboard.html', 2000);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      if (!user) return <div className="text-center mt-20 text-gray-400">กำลังโหลด...</div>;

      const selectedRoom = rooms.find(r => r.RoomID === selected);

      return (
        <div className="min-h-screen">
          {/* Navbar */}
          <header role="banner" className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-3 flex items-center justify-between shadow-sm sticky top-0 z-40 transition-colors">
            <div className="flex items-center gap-3">
              <div className="app-logo-gradient-sm w-9 h-9 rounded-xl flex items-center justify-center">
                <Icon.Camera className="w-5 h-5 text-white" />
              </div>
              <div className="text-sm font-semibold text-gray-800 dark:text-gray-100">ระบบจองห้องผลิตสื่อดิจิทัล</div>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={() => window.toggleTheme()}
                className="w-9 h-9 rounded-full flex items-center justify-center bg-gray-100 dark:bg-slate-700/50 hover:bg-gray-200 dark:hover:bg-slate-700 transition"
                aria-label="สลับธีม">
                {isDark ? <Icon.Sun className="w-4 h-4 text-yellow-400" /> : <Icon.Moon className="w-4 h-4 text-slate-600" />}
              </button>
              <a href="/dashboard.html" className="flex items-center gap-1 text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 transition">
                <Icon.Chevron className="w-4 h-4" />
                <span className="hidden sm:inline">กลับ</span>
              </a>
            </div>
          </header>

          <main id="main-content" role="main" className="p-6 max-w-3xl mx-auto">
            <a href="/dashboard.html" className="inline-flex items-center gap-1.5 text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 mb-6 transition">
              <Icon.Chevron className="w-4 h-4" />
              การจองของฉัน
            </a>

            <h1 className="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6">จองห้องผลิตสื่อ</h1>

            <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-6 space-y-6">
              {error && (
                <div className="flex items-start gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl px-4 py-3">
                  <Icon.Alert className="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" />
                  <p className="text-sm text-red-700 dark:text-red-400">{error}</p>
                </div>
              )}
              {success && (
                <div className="flex items-start gap-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl px-4 py-3">
                  <Icon.Check className="w-4 h-4 text-green-500 mt-0.5 flex-shrink-0" />
                  <p className="text-sm text-green-700 dark:text-green-400">{success}</p>
                </div>
              )}

              {/* Date */}
              <div>
                <label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">
                  <span className="inline-flex items-center gap-1.5">
                    <Icon.Calendar className="w-4 h-4 text-blue-600 dark:text-blue-400" /> วันที่ต้องการจอง
                  </span>
                </label>
                <input
                  type="date" value={date} onChange={e => setDate(e.target.value)} min={today}
                  className="w-full px-4 py-2.5 bg-gray-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition"
                />
              </div>

              {/* Time */}
              <div>
                <label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">
                  <span className="inline-flex items-center gap-1.5">
                    <Icon.Clock className="w-4 h-4 text-blue-600 dark:text-blue-400" /> ช่วงเวลาใช้งาน
                  </span>
                </label>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <p className="text-xs text-gray-500 dark:text-gray-400 mb-1.5">เวลาเริ่มต้น</p>
                    <select value={start} onChange={e => setStart(e.target.value)}
                      className="w-full px-4 py-2.5 bg-gray-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition">
                      {TIME_SLOTS.filter(t => t !== '17:00').map(t => <option key={t} value={t}>{t} น.</option>)}
                    </select>
                  </div>
                  <div>
                    <p className="text-xs text-gray-500 dark:text-gray-400 mb-1.5">เวลาสิ้นสุด</p>
                    <select value={end} onChange={e => setEnd(e.target.value)}
                      className="w-full px-4 py-2.5 bg-gray-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition">
                      {TIME_SLOTS.filter(t => t !== '08:30').map(t => <option key={t} value={t}>{t} น.</option>)}
                    </select>
                  </div>
                </div>
                <p className="text-xs text-gray-400 dark:text-gray-500 mt-2">
                  เวลาทำการ 08:30–17:00 น. · จองสูงสุด 3 ชม./ครั้ง · จองได้ 1 ครั้ง/วัน
                </p>
              </div>

              {/* Room */}
              <div>
                <label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">
                  <span className="inline-flex items-center gap-1.5">
                    <Icon.Building className="w-4 h-4 text-blue-600 dark:text-blue-400" /> เลือกห้อง
                  </span>
                </label>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {rooms.map(room => {
                    const statusKey = room.current_status || room.RoomStatus || 'available';
                    const isAvailable = statusKey === 'available';
                    const cfg = {
                      available:   { label: 'ว่าง',       dot: 'app-dot-green',  badge: 'app-badge-green' },
                      booked:      { label: 'ไม่ว่าง',     dot: 'app-dot-red',    badge: 'app-badge-red' },
                      maintenance: { label: 'ปิดปรับปรุง', dot: 'app-dot-yellow', badge: 'app-badge-yellow' },
                    }[statusKey] || { label: 'ว่าง', dot: 'app-dot-green', badge: 'app-badge-green' };
                    const isSelected = selected === room.RoomID;
                    return (
                      <button key={room.RoomID} type="button"
                        onClick={() => isAvailable && setSelected(room.RoomID)}
                        disabled={!isAvailable}
                        className={`flex items-center gap-3 p-4 rounded-xl border-2 text-left transition-all ${
                          isSelected
                            ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20'
                            : isAvailable
                              ? 'border-slate-200 dark:border-slate-700 hover:border-blue-400 bg-white dark:bg-slate-800'
                              : 'border-slate-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-700/30 opacity-60 cursor-not-allowed'
                        }`}>
                        <div className="text-2xl">🎬</div>
                        <div className="flex-1 min-w-0">
                          <div className="font-medium text-gray-800 dark:text-gray-100 text-sm">{room.RoomName}</div>
                          <div className="text-xs text-gray-500 dark:text-gray-400 flex items-center gap-1 mt-0.5">
                            <Icon.Users className="w-3 h-3" /> {room.Capacity} คน
                          </div>
                          {room.bookings_today && room.bookings_today.length > 0 && (
                            <div className="text-[10px] text-red-600 dark:text-red-400 mt-1">
                              ไม่ว่าง: {room.bookings_today.slice(0, 2).map(b => `${formatTime(b.start)}-${formatTime(b.end)}`).join(', ')}
                              {room.bookings_today.length > 2 && ` +${room.bookings_today.length - 2}`}
                            </div>
                          )}
                        </div>
                        <span className={`app-badge ${cfg.badge}`}>
                          <span className={`app-badge-dot ${cfg.dot}`} />
                          {cfg.label}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Selected room summary */}
              {selectedRoom && (
                <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl p-4 flex items-center justify-between">
                  <div>
                    <div className="text-xs text-gray-500 dark:text-gray-400 mb-0.5">ห้องที่เลือก</div>
                    <div className="font-semibold text-gray-800 dark:text-gray-100 text-sm">{selectedRoom.RoomName}</div>
                  </div>
                  <button type="button" onClick={() => setSelected(null)}
                    className="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 font-medium">
                    เปลี่ยนห้อง
                  </button>
                </div>
              )}

              <button type="submit" onClick={handleBook} disabled={loading || !selected}
                className="app-btn-primary w-full py-3 rounded-xl font-semibold text-sm">
                {loading ? 'กำลังส่งคำขอ...' : 'ยืนยันจอง'}
              </button>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BookingPage />);
  </script>
</body>
</html>
