<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จองห้อง — ระบบจองห้อง</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <link rel="stylesheet" href="/styles/responsive.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const ROOM_STATUS_COLOR = {
      available:   'bg-green-100 text-green-700 border-green-200',
      booked:      'bg-red-100 text-red-700 border-red-200',
      maintenance: 'bg-gray-100 text-gray-600 border-gray-200',
    };
    const ROOM_STATUS_LABEL = {
      available:   'ว่าง',
      booked:      'ถูกจองแล้ว',
      maintenance: 'ปิดปรับปรุง',
    };

    function BookingPage() {
      const [user, setUser]       = useState(null);
      const [rooms, setRooms]     = useState([]);
      const [selected, setSelected] = useState(null);
      const [start, setStart]     = useState('');
      const [end, setEnd]         = useState('');
      const [error, setError]     = useState('');
      const [success, setSuccess] = useState('');
      const [loading, setLoading] = useState(false);

      const today = new Date().toISOString().split('T')[0];

      useEffect(() => {
        loadRooms();
        checkLogin();
      }, []);

      async function checkLogin() {
        try {
          const u = await apiFetch('/api/auth/me');
          if (u && (u.user.role === 'student' || u.user.role === 'teacher')) {
            setUser(u.user);
          }
        } catch (e) {
          // Not logged in, that's fine
        }
      }

      async function loadRooms() {
        try {
          const data = await apiFetch('/api/rooms');
          setRooms(data);
        } catch (e) { console.error(e); }
      }

      async function handleBook(e) {
        e.preventDefault();
        setError(''); setSuccess('');
        if (!selected) return setError('กรุณาเลือกห้อง');
        if (!user) return setError('กรุณาเข้าสู่ระบบก่อนจองห้อง');
        setLoading(true);
        try {
          await apiFetch('/api/bookings', {
            method: 'POST',
            body: { roomId: selected, date: today, start, end },
          });
          setSuccess('จองห้องสำเร็จ! รอการอนุมัติจาก Admin');
          setSelected(null); setStart(''); setEnd('');
          loadRooms();
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      if (!user) return (
        <div className="text-center mt-20">
          <div className="text-gray-400 mb-4">กรุณาเข้าสู่ระบบเพื่อจองห้อง</div>
          <a href="/login.html" className="bg-primary-600 hover:bg-primary-700 text-white px-6 py-2 rounded-lg transition">
            เข้าสู่ระบบ
          </a>
        </div>
      );

      return (
        <div>
          {/* Navbar */}
          <header role="banner">
            <nav className="bg-white shadow-sm px-6 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="text-xl">🎬</span>
                <span className="font-bold text-gray-800">ระบบจองห้อง</span>
              </div>
              <div className="flex items-center gap-4">
                {user ? (
                  <>
                    <a href="/dashboard.html" className="text-sm text-gray-500 hover:text-primary-600 transition" aria-label="ไปยังหน้าแดชบอร์ด">← การจองของฉัน</a>
                    <button onClick={logout} className="text-sm text-gray-500 hover:text-red-500 transition" aria-label="ออกจากระบบ">ออกจากระบบ</button>
                  </>
                ) : (
                  <a href="/login.html" className="text-sm text-primary-600 hover:text-primary-700 transition" aria-label="ไปยังหน้าเข้าสู่ระบบ">เข้าสู่ระบบ</a>
                )}
              </div>
            </nav>
          </header>

          <main id="main-content" role="main">
            <div className="max-w-3xl mx-auto px-4 py-8">
              <h2 className="text-xl font-bold text-gray-800 mb-1">จองห้องผลิตสื่อ</h2>
              <p className="text-sm text-gray-500 mb-6">
                วันที่ {new Date().toLocaleDateString('th-TH', { dateStyle: 'full' })} · เวลาทำการ 08:30–17:00 น.
              </p>

              {/* เลือกห้อง */}
              <div className="grid grid-cols-2 gap-3 mb-6">
                {rooms.map(room => (
                  <button key={room.RoomID}
                    onClick={() => room.Status === 'available' && setSelected(room.RoomID)}
                    disabled={room.Status !== 'available'}
                    className={`rounded-xl border-2 p-4 text-left transition
                      ${selected === room.RoomID
                        ? 'border-primary-500 bg-primary-50'
                        : room.Status === 'available'
                          ? 'border-gray-200 bg-white hover:border-primary-300'
                          : 'border-gray-200 bg-gray-50 cursor-not-allowed opacity-60'}
                    `}
                  >
                    <div className="font-semibold text-gray-800">{room.RoomName}</div>
                    <div className="text-xs text-gray-500 mt-0.5">ความจุ {room.Capacity} คน</div>
                    <span className={`inline-block mt-2 text-xs font-medium px-2 py-0.5 rounded-full border ${ROOM_STATUS_COLOR[room.Status]}`}>
                      {ROOM_STATUS_LABEL[room.Status]}
                    </span>
                    {/* แสดงตารางจองที่มีอยู่ */}
                    {room.bookings_today?.length > 0 && (
                      <div className="mt-2 space-y-1">
                        {room.bookings_today.map((bk, i) => (
                          <div key={i} className="text-xs text-red-600 bg-red-50 rounded px-2 py-0.5">
                            ⏰ {bk.start}–{bk.end}
                          </div>
                        ))}
                      </div>
                    )}
                  </button>
                ))}
              </div>

              {/* ฟอร์มเวลา */}
              <div className="bg-white rounded-xl border p-6">
                <h3 className="font-semibold text-gray-700 mb-4">เลือกเวลา</h3>

                {error && (
                  <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-4">
                    {error}
                  </div>
                )}
                {success && (
                  <div className="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm mb-4">
                    ✅ {success}
                  </div>
                )}

                <form onSubmit={handleBook} className="flex items-end gap-4">
                  <div className="flex-1">
                    <label className="block text-sm font-medium text-gray-700 mb-1">เวลาเริ่ม</label>
                    <input type="time" value={start} onChange={e => setStart(e.target.value)}
                      min="08:30" max="17:00" required
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
                  </div>
                  <div className="flex-1">
                    <label className="block text-sm font-medium text-gray-700 mb-1">เวลาสิ้นสุด</label>
                    <input type="time" value={end} onChange={e => setEnd(e.target.value)}
                      min="08:30" max="17:00" required
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
                  </div>
                  <button type="submit" disabled={loading || !selected}
                    className="bg-primary-600 hover:bg-primary-700 disabled:bg-primary-300 text-white font-semibold px-6 py-2 rounded-lg transition whitespace-nowrap"
                    aria-label="ยืนยันการจองห้อง">
                    {loading ? 'กำลังส่ง...' : 'ยืนยันจอง'}
                  </button>
                </form>

                {!selected && (
                  <p className="text-xs text-gray-400 mt-3">* กรุณาเลือกห้องก่อน</p>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BookingPage />);
  </script>
</body>
</html>
