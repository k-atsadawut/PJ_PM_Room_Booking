<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จองห้อง — ระบบจองห้อง</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/styles/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/accessibility.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/assets/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary-600 text-white px-4 py-2 rounded-lg z-50">
    ข้ามไปที่เนื้อหาหลัก
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const ROOM_STATUS_COLOR = {
      available:   'bg-green-100 text-green-700 border-green-200',
      booked:      'bg-red-100 text-red-700 border-red-200',
      maintenance: 'bg-gray-100 text-gray-600 border-gray-200',
    };
    const ROOM_STATUS_LABEL = {
      available:   'ว่าง',
      booked:      'ถูกจองแล้ว',
      maintenance: 'ปิดปรับปรุง',
    };

    function BookingPage() {
      const [user, setUser]       = useState(null);
      const [rooms, setRooms]     = useState([]);
      const [selected, setSelected] = useState(null);
      const [date, setDate]       = useState('');
      const [start, setStart]     = useState('');
      const [end, setEnd]         = useState('');
      const [error, setError]     = useState('');
      const [success, setSuccess] = useState('');
      const [loading, setLoading] = useState(false);

      const today = new Date().toISOString().split('T')[0];
      const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];

      // Generate time slots (30-minute intervals from 08:30 to 17:00)
      const timeSlots = [];
      for (let hour = 8; hour <= 17; hour++) {
        for (let min = 0; min < 60; min += 30) {
          const timeStr = `${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
          if (timeStr >= '08:30' && timeStr <= '17:00') {
            timeSlots.push(timeStr);
          }
        }
      }

      useEffect(() => {
        loadRooms();
        checkLogin();
        
        // Get roomId from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('roomId');
        if (roomId) {
          setSelected(parseInt(roomId));
        }
        
        // Set default date to today
        setDate(today);
      }, []);

      async function checkLogin() {
        try {
          const u = await apiFetch('/api/auth/me');
          if (u && (u.user.role === 'student' || u.user.role === 'teacher')) {
            setUser(u.user);
          }
        } catch (e) {
          // Not logged in, that's fine
        }
      }

      async function loadRooms() {
        try {
          const data = await apiFetch('/api/rooms');
          setRooms(data);
        } catch (e) { console.error(e); }
      }

      async function handleBook(e) {
        e.preventDefault();
        setError(''); setSuccess('');
        if (!selected) return setError('กรุณาเลือกห้อง');
        if (!user) return setError('กรุณาเข้าสู่ระบบก่อนจองห้อง');
        if (!date) return setError('กรุณาเลือกวันที่');
        setLoading(true);
        try {
          await apiFetch('/api/bookings', {
            method: 'POST',
            body: { roomId: selected, date, start, end },
          });
          setSuccess('จองห้องสำเร็จ! รอการอนุมัติจาก Admin');
          setSelected(null); setStart(''); setEnd(''); setDate(today);
          loadRooms();
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      if (!user) return (
        <div className="text-center mt-20">
          <div className="text-gray-400 mb-4">กรุณาเข้าสู่ระบบเพื่อจองห้อง</div>
          <a href="/login.html" className="bg-primary-600 hover:bg-primary-700 text-white px-6 py-2 rounded-lg transition">
            เข้าสู่ระบบ
          </a>
        </div>
      );

      return (
        <div>
          {/* Navbar */}
          <header role="banner">
            <nav className="bg-white shadow-sm px-6 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="text-xl">🎬</span>
                <span className="font-bold text-gray-800">ระบบจองห้อง</span>
              </div>
              <div className="flex items-center gap-4">
                {user ? (
                  <>
                    <a href="/dashboard.html" className="text-sm text-gray-500 hover:text-primary-600 transition" aria-label="ไปยังหน้าแดชบอร์ด">← การจองของฉัน</a>
                    <button onClick={logout} className="text-sm text-gray-500 hover:text-red-500 transition" aria-label="ออกจากระบบ">ออกจากระบบ</button>
                  </>
                ) : (
                  <a href="/login.html" className="text-sm text-primary-600 hover:text-primary-700 transition" aria-label="ไปยังหน้าเข้าสู่ระบบ">เข้าสู่ระบบ</a>
                )}
              </div>
            </nav>
          </header>

          <main id="main-content" role="main">
            <div className="max-w-3xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
              <h2 className="text-xl sm:text-2xl font-bold text-gray-800 mb-1">จองห้องผลิตสื่อ</h2>
              <p className="text-sm text-gray-500 mb-6">
                เวลาทำการ 08:30–17:00 น. · จองล่วงหน้าได้สูงสุด 1 วัน
              </p>

              {/* ฟอร์มวันที่และเวลา */}
              <div className="bg-white rounded-xl border p-4 sm:p-6 mb-6">
                <h3 className="font-semibold text-gray-700 mb-4">เลือกวันที่และเวลา</h3>

                {error && (
                  <div id="booking-error" className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-4" role="alert">
                    {error}
                  </div>
                )}
                {success && (
                  <div className="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm mb-4">
                    ✅ {success}
                  </div>
                )}

                <form onSubmit={handleBook} className="space-y-4" aria-describedby="booking-error">
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">วันที่</label>
                      <select 
                        value={date} 
                        onChange={e => setDate(e.target.value)}
                        className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"
                        required
                      >
                        <option value={today}>วันนี้ ({new Date().toLocaleDateString('th-TH', { dateStyle: 'short' })})</option>
                        <option value={tomorrow}>พรุ่งนี้ ({new Date(Date.now() + 86400000).toLocaleDateString('th-TH', { dateStyle: 'short' })})</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">เวลาเริ่ม</label>
                      <select 
                        value={start} 
                        onChange={e => setStart(e.target.value)}
                        className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"
                        required
                      >
                        <option value="">เลือกเวลาเริ่ม</option>
                        {timeSlots.map(time => (
                          <option key={time} value={time}>{time}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">เวลาสิ้นสุด</label>
                      <select 
                        value={end} 
                        onChange={e => setEnd(e.target.value)}
                        className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"
                        required
                      >
                        <option value="">เลือกเวลาสิ้นสุด</option>
                        {timeSlots.map(time => (
                          <option key={time} value={time}>{time}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                  
                  {/* เลือกห้อง - แสดงเฉพาะเมื่อยังไม่เลือกห้อง */}
                  {!selected && (
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-2">เลือกห้อง</label>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {rooms.map(room => (
                          <button key={room.RoomID}
                            type="button"
                            onClick={() => room.Status === 'available' && setSelected(room.RoomID)}
                            disabled={room.Status !== 'available'}
                            className={`rounded-xl border-2 p-3 sm:p-4 text-left transition
                              ${selected === room.RoomID
                                ? 'border-primary-500 bg-primary-50'
                                : room.Status === 'available'
                                  ? 'border-gray-200 bg-white hover:border-primary-300'
                                  : 'border-gray-200 bg-gray-50 cursor-not-allowed opacity-60'}
                            `}
                          >
                            <div className="font-semibold text-gray-800 text-sm sm:text-base">{room.RoomName}</div>
                            <div className="text-xs text-gray-500 mt-0.5">ความจุ {room.Capacity} คน</div>
                            <span className={`inline-block mt-2 text-xs font-medium px-2 py-0.5 rounded-full border ${ROOM_STATUS_COLOR[room.Status]}`}>
                              {ROOM_STATUS_LABEL[room.Status]}
                            </span>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* แสดงห้องที่เลือก */}
                  {selected && (
                    <div className="bg-blue-50 rounded-xl p-3 sm:p-4">
                      <div className="flex items-center justify-between">
                        <div>
                          <div className="text-sm text-gray-600 mb-1">ห้องที่เลือก</div>
                          <div className="font-semibold text-gray-800 text-sm sm:text-base">{rooms.find(r => r.RoomID === selected)?.RoomName}</div>
                        </div>
                        <button 
                          type="button"
                          onClick={() => setSelected(null)}
                          className="text-sm text-blue-600 hover:text-blue-700"
                        >
                          เปลี่ยนห้อง
                        </button>
                      </div>
                    </div>
                  )}

                  <button type="submit" disabled={loading || !selected}
                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-semibold px-6 py-3 rounded-xl transition text-sm sm:text-base"
                    aria-label="ยืนยันการจองห้อง">
                    {loading ? 'กำลังส่ง...' : 'ยืนยันจอง'}
                  </button>
                </form>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BookingPage />);
  </script>
</body>
</html>
